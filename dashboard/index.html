 window.location.pathname.split('/');\n        const supportedLangs = ['it', 'en', 'fr', 'de', 'es'];\n        // Controlla se la lingua è nel primo segmento dell'URL (es. /de/...)\n        const urlLang = supportedLangs.find(lang => pathSegments.includes(lang));\n        return urlLang || (navigator.language || navigator.userLanguage).split('-')[0];\n    };\n    const currentLang = getLanguageContext();\n    // 2. Configurazione Identità Cross-Dominio\n    const urlParams = new URLSearchParams(window.location.search);\n    let userId = urlParams.get('uid') || localStorage.getItem('albeni_uid');\n    if (!userId) {\n        userId = 'id_' + Math.random().toString(36).substr(2, 9);\n    }\n    localStorage.setItem('albeni_uid', userId);\n    // 3. Dispatcher API con Parametro Lingua\n    const sendSignal = (eventType, metadata = {}) => {\n        fetch('https://api.albeni1905.com/v1/track/event', {\n            method: 'POST',\n            headers: { 'Content-Type': 'application/json' },\n            body: JSON.stringify({\n                user_id: userId,\n                domain: window.location.hostname,\n                lang: currentLang, // <--- Parametro Lingua Integrato\n                event_type: eventType,\n                metadata: metadata,\n                timestamp: Date.now()\n            })\n        }).catch(err => console.error('AI Signal Error:', err));\n    };\n    // 4. Sensore Dwell Time (>60s)\n    let dwellTriggered = false;\n    setTimeout(() => {\n        if (!dwellTriggered) {\n            sendSignal('dwell_time_reached', { seconds: 60 });\n            dwellTriggered = true;\n        }\n    }, 60000);\n    // 5. Sensore Scroll Depth (25/50/75/90%)\n    const scrollMilestones = [25, 50, 75, 90];\n    const triggeredMilestones = new Set();\n    window.addEventListener('scroll', () => {\n        const scrollPercent = Math.round((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100);\n        scrollMilestones.forEach(m => {\n            if (scrollPercent >= m && !triggeredMilestones.has(m)) {\n                triggeredMilestones.add(m);\n                sendSignal('scroll_depth', { depth: m });\n            }\n        });\n    });\n    // 6. Sensore Interazioni Tecniche\n    document.addEventListener('click', (e) => {\n        const target = e.target;\n        if (target.matches('.btn-compare, .video-material, .download-lead-magnet')) {\n            sendSignal('technical_interaction', { \n                element: target.className,\n                text: target.innerText,\n                context_lang: currentLang\n            });\n        }\n    });\n    // 7. Hook di Routing Dinamico (MOFU/BOFU check) localizzato\n    window.checkAIRouting = async function() {\n        const response = await fetch(`https://api.albeni1905.com/v1/router/assign?user_id=${userId}&lang=${currentLang}`);\n        const data = await response.json();\n        if (data.redirect_to && data.redirect_to !== window.location.origin) {\n            // Assicura la persistenza dell'ID e della lingua nel redirect\n            window.location.href = `${data.redirect_to}?uid=${userId}&lang=${currentLang}`;\n        }\n    };\n})();\nMiglioramenti Strategici Introdotti\nCoerenza MTPE: Il rilevamento della lingua permette di verificare se il modello Machine Translation + Post Editing sta mantenendo la coerenza narrativa e i glossari tecnici nei mercati esteri.\nPrecisione per il Mercato Tedesco: Consente all'AI di applicare correttamente il registro \"Sachlich-elegant\" (formale con il \"Sie\") per gli utenti identificati in area DE.\nSegmentazione Dashboard: L'AI Analyst può ora filtrare i KPI (CPA, CR, IDS) per lingua, permettendo alla governance di monitorare la soglia di allerta CPA (<15€) specificamente per mercati ad alto costo come Francia o Germania .\nRouting Multi-Dominio Localizzato: Evita l'errore critico di indirizzare un utente che naviga in inglese su contenuti TOFU verso una pagina di checkout BOFU in italiano.\nNota per lo Sviluppo\nAssicurati che i tuoi siti WordPress e Shopify utilizzino sottocartelle standard per le lingue (es. /de/, /fr/) per massimizzare l'efficacia della funzione getLanguageContext.", "file_path": "snippet JavaScript aggiornato per l.docx"}, {"id": "content_1303abb4", "title": "Snippet JavaScript Unificato — Tutti i Domini", "category": "document", "language": "IT", "date_created": "2026-03-14", "tags": ["JavaScript", "snippet", "domini", "sensore"], "summary": "Ecco lo snippet JavaScript unificato da inserire nell'header (all'interno del tag <script>) di tutti i siti dell'ecosistema Albeni 1905. Questo script trasforma ogni pagina in un sensore attivo per l'…", "body": "Ecco lo snippet JavaScript unificato da inserire nell'header (all'interno del tag <script>) di tutti i siti dell'ecosistema Albeni 1905. Questo script trasforma ogni pagina in un sensore attivo per l'AI Orchestration Layer, gestendo l'identità cross-dominio e catturando i segnali comportamentali richiesti.\nSnippet di Tracciamento e Routing AI\nJavaScript\n(function() {\n    // 1. Configurazione Identità Cross-Dominio [cite: 20, 1973]\n    const urlParams = new URLSearchParams(window.location.search);\n    let userId = urlParams.get('uid') || localStorage.getItem('albeni_uid');\n    if (!userId) {\n        userId = 'id_' + Math.random().toString(36).substr(2, 9);\n    }\n    localStorage.setItem('albeni_uid', userId);\n    // 2. Dispatcher API [cite: 1956, 2659]\n    const sendSignal = (eventType, metadata = {}) => {\n        fetch('https://api.albeni1905.com/v1/track/event', {\n            method: 'POST',\n            headers: { 'Content-Type': 'application/json' },\n            body: JSON.stringify({\n                user_id: userId,\n                domain: window.location.hostname,\n                event_type: eventType,\n                metadata: metadata,\n                timestamp: Date.now()\n            })\n        }).catch(err => console.error('AI Signal Error:', err));\n    };\n    // 3. Sensore Dwell Time (>60s) [cite: 21, 2419]\n    let dwellTriggered = false;\n    setTimeout(() => {\n        if (!dwellTriggered) {\n            sendSignal('dwell_time_reached', { seconds: 60 });\n            dwellTriggered = true;\n        }\n    }, 60000);\n    // 4. Sensore Scroll Depth (25/50/75/90%) [cite: 21, 2418]\n    const scrollMilestones = [25, 50, 75, 90];\n    const triggeredMilestones = new Set();\n    window.addEventListener('scroll', () => {\n        const scrollPercent = Math.round((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100);\n        scrollMilestones.forEach(m => {\n            if (scrollPercent >= m && !triggeredMilestones.has(m)) {\n                triggeredMilestones.add(m);\n                sendSignal('scroll_depth', { depth: m });\n            }\n        });\n    });\n    // 5. Sensore Interazioni Tecniche [cite: 2420, 2659]\n    document.addEventListener('click', (e) => {\n        const target = e.target;\n        if (target.matches('.btn-compare, .video-material, .download-lead-magnet')) {\n            sendSignal('technical_interaction', { \n                element: target.className,\n                text: target.innerText \n            });\n        }\n    });\n    // 6. Hook di Routing Dinamico (MOFU/BOFU check) [cite: 27, 2664]\n    window.checkAIRouting = async function() {\n        const response = await fetch(`https://api.albeni1905.com/v1/router/assign?user_id=${userId}`);\n        const data = await response.json();\n        if (data.redirect_to && data.redirect_to !== window.location.origin) {\n            window.location.href = `${data.redirect_to}?uid=${userId}`;\n        }\n    };\n})();\nManuale d'Uso Rapido per l'Integrazione\nA. Installazione\nDove: Copia lo script sopra e incollalo subito prima della chiusura del tag </head> in WordPress (per worldofmerino e merinouniversity) e nelle impostazioni del tema Shopify (per albeni1905).\nPersonalizzazione: Sostituisci https://api.albeni1905.com con l'URL reale dove hai distribuito l'ambiente Node.js.\nB. Tagging degli Elementi Critici\nPerché il sensore di interazioni tecniche funzioni, assicurati che i pulsanti e i link importanti nei tuoi siti abbiano le classi CSS corrispondenti:\nComparativa pesi: Aggiungi la classe btn-compare.\nVideo tecnici: Aggiungi la classe video-material.\nLead Magnet: Aggiungi la classe download-lead-magnet.\nC. Gestione Cross-Dominio\nLo script gestisce automaticamente il passaggio dell'ID utente.\nOgni volta che crei un link manuale tra i siti (es. da un blog post a una landing BOFU), lo script si assicurerà che il parametro ?uid=... venga mantenuto per non interrompere il calcolo dell'Intent Depth Score (IDS).\nD. Verifica\nPuoi verificare il funzionamento aprendo la console del browser (F12) e controllando la scheda \"Network\": dovresti vedere chiamate POST verso l'endpoint /v1/track/event ad ogni milestone di scroll o dopo 60 secondi di permanenza.", "file_path": "snippet JavaScript unificato .docx"}, {"id": "content_f9f6354d", "title": "Snippet Chatbot Tecnico — Invisible Luxury", "category": "document", "language": "IT", "date_created": "2026-03-14", "tags": ["chatbot", "snippet", "Invisible Luxury", "merinounbound"], "summary": "snippet per il Chatbot Tecnico \"Invisible Luxury\". È progettato per essere leggero, elegante e integrato nativamente con l'AI Orchestration Layer. Questo modulo va inserito preferibilmente su merinoun…", "body": "snippet per il Chatbot Tecnico \"Invisible Luxury\". È progettato per essere leggero, elegante e integrato nativamente con l'AI Orchestration Layer.\nQuesto modulo va inserito preferibilmente su merinouniversity.com, agendo come l'interfaccia frontale del tuo motore di ricerca semantica.\n1. Struttura HTML e Stile CSS\nIl design segue i canoni Albeni: sobrio, minimale, focalizzato sulla sostanza.\nHTML\n<div id=\"albeni-chat-container\">\n    <div id=\"albeni-chat-header\">\n        <span>Albeni 1905 Technical Assistant</span>\n        <button id=\"close-chat\">—</button>\n    </div>\n    <div id=\"albeni-chat-messages\"></div>\n    <div id=\"albeni-chat-input-area\">\n        <input type=\"text\" id=\"albeni-user-input\" placeholder=\"Chiedi sulla lana 17 micron...\">\n        <button id=\"albeni-send-btn\">Invia</button>\n    </div>\n</div>\n<style>\n    #albeni-chat-container {\n        position: fixed; bottom: 20px; right: 20px; width: 350px; \n        height: 450px; background: #fff; border: 1px solid #d1d1d1;\n        box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column;\n        font-family: 'Helvetica', sans-serif; z-index: 10000; border-radius: 4px;\n    }\n    #albeni-chat-header { \n        background: #1a1a1a; color: #fff; padding: 12px; font-size: 14px;\n        display: flex; justify-content: space-between; letter-spacing: 0.5px;\n    }\n    #albeni-chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; line-height: 1.5; }\n    .msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 4px; max-width: 85%; }\n    .msg.user { background: #f0f0f0; align-self: flex-end; margin-left: auto; }\n    .msg.ai { background: #fff; border-left: 2px solid #1a1a1a; }\n    #albeni-chat-input-area { display: flex; border-top: 1px solid #eee; padding: 10px; }\n    #albeni-user-input { flex: 1; border: none; outline: none; font-size: 13px; }\n    #albeni-send-btn { background: none; border: none; cursor: pointer; font-weight: bold; color: #1a1a1a; }\n</style>\n2. Logica JavaScript (Integrazione API)\nQuesto script si collega all'endpoint /v1/ai/ask-technical e recupera automaticamente il cluster utente dal localStorage (impostato dal sensore principale).\nJavaScript\n(function() {\n    const chatContainer = document.getElementById('albeni-chat-container');\n    const msgArea = document.getElementById('albeni-chat-messages');\n    const inputField = document.getElementById('albeni-user-input');\n    const sendBtn = document.getElementById('albeni-send-btn');\n    // Recupera contesto dall'AI Orchestration Layer\n    const userId = localStorage.getItem('albeni_uid');\n    const userCluster = localStorage.getItem('albeni_cluster') || 'generic';\n    function addMessage(text, role) {\n        const div = document.createElement('div');\n        div.className = `msg ${role}`;\n        div.innerText = text;\n        msgArea.appendChild(div);\n        msgArea.scrollTop = msgArea.scrollHeight;\n    }\n    async function askAI() {\n        const query = inputField.value.trim();\n        if (!query) return;\n        addMessage(query, 'user');\n        inputField.value = '';\n        addMessage('Sta consultando gli archivi tecnici...', 'ai');\n        try {\n            const response = await fetch(`https://api.albeni1905.com/v1/ai/ask-technical?query=${encodeURIComponent(query)}&cluster=${userCluster}`);\n            const data = await response.json();\n            // Rimuove messaggio di caricamento e aggiunge risposta reale\n            msgArea.lastChild.remove();\n            addMessage(data.answer, 'ai');\n        } catch (error) {\n            msgArea.lastChild.innerText = \"Spiacente, il servizio tecnico è momentaneamente non disponibile.\";\n        }\n    }\n    sendBtn.onclick = askAI;\n    inputField.onkeypress = (e) => { if(e.key === 'Enter') askAI(); };\n})();\nPerché questa implementazione è strategica?\nCoerenza Narrativa: Grazie alla temperature bassa impostata nel backend, il chatbot non divagherà. Risponderà solo ciò che è scritto su Notion.\nAumento dell'IDS: Ogni interazione con il chatbot invia un segnale all'AI Router. Se un utente fa 3 domande tecniche, il suo Intent Depth Score schizzerà verso l'alto, accelerando il passaggio alla fase BOFU (vendita).\nInvisible Assistance: Il design non è invasivo. Non è un bot commerciale che \"urla\", ma un assistente tecnico silenzioso che compare solo quando l'utente ha bisogno di sostanza.", "file_path": "snippet_Chatbot Tecnico.docx"}, {"id": "content_1010e7bf", "title": "Snippet JavaScript — Supporto Multi-Lingua Multi-Mercato", "category": "document", "language": "IT", "date_created": "2026-03-14", "tags": ["JavaScript", "lingua", "mercati", "IT EN FR DE ES"], "summary": "Certamente. Lo snippet JavaScript e l'intera logica dell'AI Orchestration Layer devono essere implementati in tutte le lingue e per tutti i mercati previsti dal piano (IT, EN, FR, DE, ES). Senza un'in…", "body": "Certamente. Lo snippet JavaScript e l'intera logica dell'AI Orchestration Layer devono essere implementati in tutte le lingue e per tutti i mercati previsti dal piano (IT, EN, FR, DE, ES).\nSenza un'integrazione universale, il \"cervello\" dell'applicazione perderebbe la visibilità sui segnali comportamentali degli utenti internazionali, rendendo impossibile la clusterizzazione e il calcolo dell'Intent Depth Score (IDS) al di fuori del mercato italiano.\nEcco perché l'integrazione multilingua è tecnicamente e strategicamente obbligatoria:\n1. Alimentazione dell'IDS Globale\nL'algoritmo IDS deve pesare i segnali (scroll, tempo, interazioni) in modo uniforme tra tutti i domini e le lingue. Un utente tedesco che legge una guida tecnica tradotta tramite il modello MTPE deve accumulare punti IDS esattamente come un utente italiano per essere riconosciuto come \"pronto all'acquisto\" (IDS > 65).\n2. Validazione del Modello di Traduzione (AI Translation Layer)\nL'integrazione permette di monitorare l'efficacia delle traduzioni. Se lo snippet rileva che gli utenti francesi hanno un Bounce Rate elevato sulle guide tecniche, l'AI segnalerà alla governance la necessità di rivedere il glossario tecnico o il registro \"Sachlich-elegant\" utilizzato per quel mercato.\n3. Routing Cross-Dominio Internazionale\nIl piano prevede l'espansione in EU5 (Germania, Francia, Spagna, Olanda). Lo snippet è il \"ponte\" che permette di mantenere l'identità dell'utente (user_id) quando questo passa, ad esempio, dai contenuti lifestyle in lingua inglese su worldofmerino.com alla landing di conversione tecnica su perfectmerinoshirt.com.\n4. Coerenza della Segmentazione (Cluster Prediction)\nL'applicazione deve assegnare ogni utente a uno dei 5 cluster (es. Business Professional o Conscious Premium) indipendentemente dalla lingua. Lo snippet invia le query digitate e i pattern di navigazione all'AI Logic Layer, che deve essere istruito per riconoscere l'intento semantico in IT, EN, FR e DE.\n5. Controllo del ROI e CPA per Mercato\nLa Dashboard di Governance deve mostrare in tempo reale se il CPA in Germania sta superando la soglia di allerta di 15€. Questo controllo è possibile solo se lo snippet di tracciamento è attivo e configurato correttamente su tutte le versioni linguistiche del funnel.\nConsiglio Tecnico:\nNello snippet che abbiamo preparato, il parametro domain: window.location.hostname cattura automaticamente la provenienza. Assicurati che l'endpoint /v1/track/event nel backend Node.js salvi anche la lingua del browser o la sottocartella della lingua (es. /fr/) per permettere all'AI di affinare le risposte dinamiche.", "file_path": "snippet_language.docx"}, {"id": "content_e3f7611e", "title": "Software Pack Completo — AI Orchestration Layer", "category": "document", "language": "IT", "date_created": "2026-03-14", "tags": ["software", "pacchetto", "script", "integrazione"], "summary": "Per completare lo sviluppo tecnico dell'AI Orchestration Layer di Albeni 1905, ecco il pacchetto software completo e integrato. Gli script sono progettati per operare in modo sinergico tra i quattro d…", "body": "Per completare lo sviluppo tecnico dell'AI Orchestration Layer di Albeni 1905, ecco il pacchetto software completo e integrato. Gli script sono progettati per operare in modo sinergico tra i quattro domini, garantendo la protezione del know-how e l'ottimizzazione del funnel basata sull'intento .\n1. Frontend: Snippet \"Sensore\" Universale (JavaScript)\nDa inserire nell'header di tutti i siti (worldofmerino, merinouniversity, perfectmerinoshirt, albeni1905) in tutte le lingue.\nJavaScript\n(function() {\n    // 1. Identità Cross-Dominio e Lingua\n    const urlParams = new URLSearchParams(window.location.search);\n    let userId = urlParams.get('uid') || localStorage.getItem('albeni_uid') || 'id_' + Math.random().toString(36).substr(2, 9);\n    localStorage.setItem('albeni_uid', userId);\n    const getLang = () => {\n        const path = window.location.pathname.split('/');\n        const supported = ['it', 'en', 'fr', 'de', 'es'];\n        return supported.find(l => path.includes(l)) || navigator.language.split('-')[0];\n    };\n    // 2. Dispatcher Segnali all'AI Router\n    const sendAI = (type, data = {}) => {\n        fetch('https://api.albeni1905.com/v1/track/event', {\n            method: 'POST',\n            headers: { 'Content-Type': 'application/json' },\n            body: JSON.stringify({ user_id: userId, lang: getLang(), domain: window.location.hostname, event_type: type, metadata: data })\n        }).catch(() => {});\n    };\n    // 3. Monitoraggio Comportamentale (Scroll, Tempo, Click) [cite: 21, 2418-2420]\n    let milestones = new Set();\n    window.addEventListener('scroll', () => {\n        const p = Math.round((window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100);\n        [25, 50, 75, 90].forEach(m => {\n            if (p >= m && !milestones.has(m)) { milestones.add(m); sendAI('scroll_depth', { depth: m }); }\n        });\n    });\n    setTimeout(() => sendAI('dwell_60s'), 60000);\n    document.addEventListener('click', (e) => {\n        if (e.target.matches('.btn-tech, .download-guide, .compare-gsm')) {\n            sendAI('technical_interaction', { element: e.target.innerText });\n        }\n    });\n    // 4. Hook di Routing Dinamico [cite: 27, 2421]\n    window.checkAIRouting = async () => {\n        const res = await fetch(`https://api.albeni1905.com/v1/router/assign?user_id=${userId}&lang=${getLang()}`);\n        const data = await res.json();\n        if (data.redirect_to && !window.location.href.includes(data.redirect_to)) {\n            window.location.href = `${data.redirect_to}?uid=${userId}&lang=${getLang()}`;\n        }\n    };\n})();\n2. Backend Routing: AI Router (Node.js/Express)\nGestisce l'ingestion rapida e il reindirizzamento tra i domini in meno di 120ms.\nJavaScript\nconst express = require('express');\nconst Redis = require('ioredis');\nconst app = express();\nconst redis = new Redis(process.env.REDIS_URL);\napp.get('/v1/router/assign', async (req, res) => {\n    const { user_id, lang } = req.query;\n    try {\n        const ids = await redis.get(`user:${user_id}:ids`) || 0;\n        const cluster = await redis.get(`user:${user_id}:cluster`) || 'unknown';\n        let target = '';\n        // Logica di routing per soglie IDS [cite: 1932-1935, 2025-2027, 2423-2425]\n        if (ids <= 30) target = 'worldofmerino.com';\n        else if (ids <= 65) target = 'merinouniversity.com';\n        else target = (cluster === 'business' || cluster === 'minimalist') ? 'perfectmerinoshirt.com' : 'albeni1905.com';\n        res.json({ redirect_to: `https://${target}/${lang}/` });\n    } catch (e) { res.status(500).send(); }\n});\napp.listen(3000);\n3. AI Logic: ML Worker (Python/FastAPI)\nCalcola l'Intent Depth Score (IDS) e sincronizza Klaviyo quando l'IDS supera 65 .\nPython\nfrom fastapi import FastAPI\nfrom openai import OpenAI\nimport redis, requests\napp = FastAPI()\nclient = OpenAI(api_key=\"sk-...\")\ndb_redis = redis.Redis(host='redis')\n@app.post(\"/v1/ml/process-intent\")\ndef process_intent(user_id: str):\n    # 1. Recupero segnali e calcolo IDS [cite: 1979, 3044]\n    # IDS = (Tempo * 0.2) + (Scroll * 0.2) + (Interazioni * 0.4) + (Ritorno * 0.2)\n    score = calculate_ids_logic(user_id) \n    db_redis.set(f\"user:{user_id}:ids\", score)\n    # 2. Se IDS > 65, genera copy e invia a Klaviyo [cite: 25, 2174, 3048]\n    if score > 65:\n        cluster = predict_cluster(user_id) # Logica basata su query e path [cite: 26, 1960]\n        copy = client.chat.completions.create(\n            model=\"gpt-4o\",\n            messages=[{\"role\": \"system\", \"content\": \"Creative Director Albeni. Assioma: Same Silhouette, Superior Substance.\"}]\n        )\n        sync_to_klaviyo(user_id, cluster, copy.choices[0].message.content)\n    return {\"ids\": score}\n4. Protezione: Moat Digitale (Python/Middleware)\nGestisce lo standard C2PA e la difesa \"Pay-as-you-crawl\" .\nPython\ndef active_moat_protection(request):\n    user_agent = request.headers.get('User-Agent')\n    # 1. Blocco Bot Estrattivi [cite: 42, 687-688, 2015]\n    ai_bots = [\"GPTBot\", \"Google-Extended\", \"ClaudeBot\", \"PerplexityBot\"]\n    if any(bot in user_agent for bot in ai_bots):\n        return 402, \"Payment Required - AI Licensing Required\" # Protocollo Pay-as-you-crawl [cite: 2016, 2438]\n    # 2. Iniezione C2PA su asset tecnici [cite: 1970, 2301]\n    if request.path.endswith('.pdf') or 'material-science' in request.path:\n        inject_cryptographic_metadata(request.file) # Firma digitale Albeni 1905\n5. Infrastruttura: Configurazione Docker Integrata\nPer far girare l'intero stack in modo isolato e sicuro.\nYAML\nservices:\n  ai-logic: # Python FastAPI\n    build: ./ml-worker\n    env_file: .env\n    depends_on: [redis, db]\n  ai-router: # Node.js Express\n    build: ./router\n    ports: [\"3000:3000\"]\n    depends_on: [redis]\n  [cite_start]redis: # Caching <120ms [cite: 1984, 2421]\n    image: redis:alpine\n  [cite_start]db: # Data Lake PostgreSQL [cite: 22, 1972]\n    image: postgres:15-alpine\nProssima Azione Esecutiva\nIl software è pronto. Per il roll-out, è necessario configurare gli Alert CPA (Verde $\\le$ 9€, Rosso $>15$€) direttamente nella dashboard per monitorare la sostenibilità economica della partnership 50/50 .", "file_path": "software_pack_ai_orchestration.docx"}]};</script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ML_API and ROUTER_API: empty string = same origin (Railway production).
// ai-router serves the dashboard AND proxies /v1/* to ml-worker via app.all('/v1/*').
// For local dev override with ?api=http://localhost:8000&router=http://localhost:3000
const _qs = new URLSearchParams(window.location.search);
const ML_API = _qs.get('api') ?? '';
const ROUTER_API = _qs.get('router') ?? '';

// ============================================================
// API Helper
// ============================================================
async function api(path, opts = {}) {
    try {
        const res = await fetch(`${ML_API}${path}`, {
            headers: { 'Content-Type': 'application/json' },
            ...opts,
        });
        return await res.json();
    } catch (e) {
        console.error(`API error ${path}:`, e);
        return null;
    }
}

// ============================================================
// APP
// ============================================================
function App() {
    const [page, setPage] = useState('dashboard');
    const [health, setHealth] = useState(null);
    const [notionStats, setNotionStats] = useState(null);

    const refreshHealth = useCallback(async () => {
        const h = await api('/health');
        setHealth(h);
    }, []);

    useEffect(() => { refreshHealth(); const i = setInterval(refreshHealth, 30000); return () => clearInterval(i); }, []);
    useEffect(() => { api('/v1/notion/pipeline/stats').then(setNotionStats); }, []);

    const pendingCount = notionStats?.by_status?.['Da Fare'] || 0;

    return (
        <React.Fragment>

function NotionPage({ onStatsUpdate }) {
    const [tasks, setTasks] = useState([]);
    const [loading, setLoading] = useState(true);
    const [generating, setGenerating] = useState(false);
    const [genResults, setGenResults] = useState(null);
    const [genLimit, setGenLimit] = useState(1);

    const loadTasks = async () => {
        setLoading(true);
        const data = await api('/v1/notion/pipeline');
        setTasks(data?.tasks || []);
        setLoading(false);
        const stats = await api('/v1/notion/pipeline/stats');
        if (stats && onStatsUpdate) onStatsUpdate(stats);
    };

    useEffect(() => { loadTasks(); }, []);

    const generateContent = async () => {
        setGenerating(true);
        setGenResults(null);
        const data = await api(`/v1/notion/generate-from-pipeline?limit=${genLimit}`, { method: 'POST' });
        setGenResults(data);
        setGenerating(false);
        loadTasks();
    };

    const statusBadge = (status) => {
        const map = { 'Da Fare': 'badge-red', 'In Produzione': 'badge-yellow', 'In Traduzione': 'badge-purple', 'In Revisione': 'badge-blue', 'Pubblicato': 'badge-green' };
        return <span className={`badge ${map[status] || 'badge-gray'}`}>{status || '—'}</span>;
    };

    return (
        <React.Fragment>
            <div className="page-header">
                <h2>Notion Content Pipeline</h2>
                <div className="btn-group">
                    <button className="btn btn-secondary" onClick={loadTasks}>Aggiorna</button>
                </div>
            </div>

            <div className="card" style={{marginBottom:'20px', display:'flex', alignItems:'center', gap:'16px', flexWrap:'wrap'}}>
                <span style={{fontSize:'13px',color:'#a1a1aa'}}>Genera contenuti AI per i task "Da Fare":</span>
                <select value={genLimit} onChange={e=>setGenLimit(Number(e.target.value))}
                    style={{background:'#27272a',color:'#e4e4e7',border:'1px solid #3f3f46',borderRadius:'6px',padding:'6px 12px',fontSize:'13px'}}>
                    {[1,2,3,5,10].map(n => <option key={n} value={n}>{n} task</option>)}
                </select>
                <button className="btn btn-primary" onClick={generateContent} disabled={generating}>
                    {generating ? <React.Fragment><span className="spinner" style={{marginRight:'8px'}}></span> Generando...</React.Fragment> : '🤖 Genera + Valida'}
                </button>
            </div>

            {genResults && (
                <div className="card" style={{marginBottom:'20px', borderColor: genResults.results?.every(r=>r.validation_passed) ? '#166534' : '#92400e'}}>
                    <h3 style={{fontSize:'14px',marginBottom:'12px',color:'#fafafa'}}>Risultati Generazione</h3>
                    {genResults.results?.map((r, i) => (
                        <div key={i} style={{padding:'10px 0', borderBottom:'1px solid #27272a'}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <span style={{fontWeight:500,color:'#e4e4e7'}}>{r.title}</span>
                                <span className={`badge ${r.validation_passed ? 'badge-green' : 'badge-red'}`}>
                                    CQS: {r.cqs_score}/100 {r.validation_passed ? '✅' : '❌'}
                                </span>
                            </div>
                            {r.errors?.length > 0 && <div style={{color:'#f87171',fontSize:'12px',marginTop:'6px'}}>{r.errors.join(' | ')}</div>}
                            {r.warnings?.length > 0 && <div style={{color:'#fbbf24',fontSize:'12px',marginTop:'4px'}}>{r.warnings.join(' | ')}</div>}
                            <div style={{color:'#52525b',fontSize:'11px',marginTop:'4px'}}>Model: {r.model_used} | AI Verdict: {r.ai_verdict || '—'} | Tokens: {r.tokens_used || 0}</div>
                        </div>
                    ))}
                </div>
            )}

            <div className="table-wrap">
                <div className="table-header">
                    <h3>Tutti i Contenuti ({tasks.length})</h3>
                </div>
                <table>
                    <thead>
                        <tr><th>Contenuto</th><th>Cluster</th><th>Dominio</th><th>Funnel</th><th>Lingua</th><th>Mese</th><th>Stato</th></tr>
                    </thead>
                    <tbody>
                        {loading ? <tr><td colSpan={7} style={{textAlign:'center'}}><span className="spinner"></span></td></tr> :
                        tasks.map((t, i) => (
                            <tr key={i}>
                                <td style={{fontWeight:500,maxWidth:'250px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</td>
                                <td><span className="badge badge-purple">{t.cluster || '—'}</span></td>
                                <td style={{fontSize:'12px'}}>{t.domain || '—'}</td>
                                <td><span className={`badge ${t.funnel_stage==='TOFU'?'badge-blue':t.funnel_stage==='MOFU'?'badge-yellow':'badge-red'}`}>{t.funnel_stage || '—'}</span></td>
                                <td>{(t.languages||[]).join(', ')}</td>
                                <td>{t.month || '—'}</td>
                                <td>{statusBadge(t.status)}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        </React.Fragment>
    );
}

function ContentPage() {

    const [contentType, setContentType] = useState('email_copy');
    const [domain, setDomain] = useState('perfectmerinoshirt.com');
    const [result, setResult] = useState(null);
    const [generating, setGenerating] = useState(false);
    const [savedToast, setSavedToast] = useState(false);

    const clusters = ['business_professional','heritage_mature','conscious_premium','modern_minimalist','italian_authentic'];
    const types = ['email_copy','blog_draft','landing_copy','lead_magnet'];
    const domains = ['worldofmerino.com','merinouniversity.com','perfectmerinoshirt.com','albeni1905.com'];
    const langs = ['it','en','de','fr','es'];

    const generate = async () => {
        setGenerating(true);
        const data = await api('/v1/content/generate', {
            method: 'POST',
            body: JSON.stringify({ cluster, language, content_type: contentType, domain })
        });
        if (data && data.generated_content) {
            // Auto-save to Content Library (localStorage)
            const entry = {
                id: 'cai_' + Date.now(),
                date: new Date().toISOString(),
                cluster, language, contentType, domain,
                result: data
            };
            try {
                const existing = JSON.parse(localStorage.getItem('albeni_content_library') || '[]');
                existing.unshift(entry);
                localStorage.setItem('albeni_content_library', JSON.stringify(existing));
                setSavedToast(true);
                setTimeout(() => setSavedToast(false), 3000);
            } catch(e) { console.warn('localStorage save failed', e); }
        }
        setResult(data);
        setGenerating(false);
    };

    return (
        <React.Fragment>
            <div className="page-header">
                <h2>Content AI Generator + Validator</h2>
            </div>
            {savedToast && (
                <div style={{background:'#052e16',border:'1px solid #166534',borderRadius:'8px',padding:'12px 16px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'10px'}}>
                    <span style={{fontSize:'16px'}}>✅</span>
                    <span style={{fontSize:'13px',color:'#4ade80',fontWeight:500}}>Contenuto salvato automaticamente nella Content Library</span>
                </div>
            )}

            <div className="card" style={{marginBottom:'20px'}}>
                <h3 style={{fontSize:'15px',marginBottom:'16px',color:'#fafafa'}}>Genera Contenuto</h3>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'12px',marginBottom:'16px'}}>
                    <div>
                        <label style={{fontSize:'11px',color:'#71717a',display:'block',marginBottom:'4px'}}>CLUSTER</label>
                        <select value={cluster} onChange={e=>setCluster(e.target.value)} style={{width:'100%',background:'#27272a',color:'#e4e4e7',border:'1px solid #3f3f46',borderRadius:'6px',padding:'8px'}}>
                            {clusters.map(c => <option key={c} value={c}>{c.replace(/_/g,' ')}</option>)}
                        </select>
                    </div>
                    <div>
                        <label style={{fontSize:'11px',color:'#71717a',display:'block',marginBottom:'4px'}}>TIPO</label>
                        <select value={contentType} onChange={e=>setContentType(e.target.value)} style={{width:'100%',background:'#27272a',color:'#e4e4e7',border:'1px solid #3f3f46',borderRadius:'6px',padding:'8px'}}>
                            {types.map(t => <option key={t} value={t}>{t.replace(/_/g,' ')}</option>)}
                        </select>
                    </div>
                    <div>
                        <label style={{fontSize:'11px',color:'#71717a',display:'block',marginBottom:'4px'}}>LINGUA</label>
                        <select value={language} onChange={e=>setLanguage(e.target.value)} style={{width:'100%',background:'#27272a',color:'#e4e4e7',border:'1px solid #3f3f46',borderRadius:'6px',padding:'8px'}}>
                            {langs.map(l => <option key={l} value={l}>{l.toUpperCase()}</option>)}
                        </select>
                    </div>
                    <div>
                        <label style={{fontSize:'11px',color:'#71717a',display:'block',marginBottom:'4px'}}>DOMINIO</label>
                        <select value={domain} onChange={e=>setDomain(e.target.value)} style={{width:'100%',background:'#27272a',color:'#e4e4e7',border:'1px solid #3f3f46',borderRadius:'6px',padding:'8px'}}>
                            {domains.map(d => <option key={d} value={d}>{d}</option>)}
                        </select>
                    </div>
                </div>
                <button className="btn btn-primary" onClick={generate} disabled={generating}>
                    {generating ? <React.Fragment><span className="spinner" style={{marginRight:'8px'}}></span> Generando...</React.Fragment> : '🤖 Genera con Gemini'}
                </button>
            </div>

            {result && (
                <div className="card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                        <h3 style={{fontSize:'15px',color:'#fafafa'}}>Risultato</h3>
                        <div style={{display:'flex',gap:'8px'}}>
                            <span className={`badge ${result.content_quality_score >= 76 ? 'badge-green' : 'badge-red'}`}>CQS: {result.content_quality_score}/100</span>
                            <span className="badge badge-blue">{result.model_used}</span>
                            <span className="badge badge-gray">{result.tokens_used} tokens</span>
                        </div>
                    </div>
                    <pre style={{background:'#111113',padding:'16px',borderRadius:'8px',fontSize:'12px',color:'#d4d4d8',whiteSpace:'pre-wrap',maxHeight:'400px',overflowY:'auto'}}>
                        {JSON.stringify(result.generated_content, null, 2)}
                    </pre>
                </div>
            )}
        </React.Fragment>
    );
}

// ============================================================
// RESEARCH DATA HUB PAGE (Universal Upload & Browse)
// ============================================================
function SemrushDataPage() {
    const [imports, setImports] = useState([]);
    const [stats, setStats] = useState(null);
    const [loading, setLoading] = useState(true);
    const [uploading, setUploading] = useState(false);
    const [uploadResult, setUploadResult] = useState(null);
    const [selectedImport, setSelectedImport] = useState(null);
    const [importData, setImportData] = useState(null);
    const [loadingData, setLoadingData] = useState(false);
    const [searchQuery, setSearchQuery] = useState('');
    const [searchResults, setSearchResults] = useState(null);
    const [searchLoading, setSearchLoading] = useState(false);
    const [activeTab, setActiveTab] = useState('library');
    const [sourceFilter, setSourceFilter] = useState('');
    const fileInputRef = useRef(null);

    const loadLibrary = async () => {
        setLoading(true);
        const url = sourceFilter ? `/v1/hub?source=${sourceFilter}` : '/v1/hub';
        const data = await api(url);
        setImports(data?.imports || []);
        setStats(data?.stats || null);
        setLoading(false);
    };

    useEffect(() => { loadLibrary(); }, [sourceFilter]);

    const handleUpload = async (e) => {
        const files = e.target.files;
        if (!files || files.length === 0) return;

        setUploading(true);
        setUploadResult(null);

        const results = [];
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('label', file.name);

            try {
                const res = await fetch(`${ML_API}/v1/hub/upload`, {
                    method: 'POST',
                    body: formData,
                });
                const data = await res.json();
                if (!res.ok) {
                    results.push({ filename: file.name, status: 'error', error: data.detail || `HTTP ${res.status}` });
                } else {
                    results.push({ filename: file.name, ...data });
                }
            } catch (err) {
                results.push({ filename: file.name, status: 'error', error: err.message });
            }
        }

        setUploadResult(results);
        setUploading(false);
        loadLibrary();
        if (fileInputRef.current) fileInputRef.current.value = '';
    };

    const viewImport = async (imp) => {
        if (selectedImport?.id === imp.id) {
            setSelectedImport(null);
            setImportData(null);
            return;
        }
        setSelectedImport(imp);
        setLoadingData(true);
        const data = await api(`/v1/hub/${imp.id}`);
        setImportData(data);
        setLoadingData(false);
    };

    const deleteImport = async (importId) => {
        await fetch(`${ML_API}/v1/hub/${importId}`, { method: 'DELETE' });
        setSelectedImport(null);
        setImportData(null);
        loadLibrary();
    };

    const searchKeywords = async () => {
        if (!searchQuery.trim()) return;
        setSearchLoading(true);
        const data = await api(`/v1/hub/search/all?q=${encodeURIComponent(searchQuery)}${sourceFilter ? '&source=' + sourceFilter : ''}`);
        setSearchResults(data);
        setSearchLoading(false);
    };

    const fmt = (n) => typeof n === 'number' ? n.toLocaleString('it-IT') : '—';
    const fmtDate = (d) => d ? new Date(d).toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';

    const sourceMeta = {
        semrush: { label: 'Semrush', icon: '📊', color: 'badge-yellow' },
        google_analytics: { label: 'Google Analytics', icon: '📈', color: 'badge-blue' },
        google_ads: { label: 'Google Ads', icon: '💰', color: 'badge-green' },
        search_console: { label: 'Search Console', icon: '🔍', color: 'badge-purple' },
        ahrefs: { label: 'Ahrefs', icon: '🔗', color: 'badge-blue' },
        screaming_frog: { label: 'Screaming Frog', icon: '🐸', color: 'badge-green' },
        shopify: { label: 'Shopify', icon: '🛒', color: 'badge-green' },
        klaviyo: { label: 'Klaviyo', icon: '📧', color: 'badge-purple' },
        skill: { label: 'AI Skill', icon: '🧠', color: 'badge-purple' },
        custom: { label: 'Custom', icon: '📄', color: 'badge-gray' },
        pdf: { label: 'PDF', icon: '📕', color: 'badge-red' },
        docx: { label: 'Word', icon: '📘', color: 'badge-blue' },
        text: { label: 'Testo', icon: '📝', color: 'badge-gray' },
        json: { label: 'JSON', icon: '🔧', color: 'badge-gray' },
    };

    const typeLabels = {
        keyword_overview: 'Keyword Overview',
        keyword_magic: 'Keyword Magic Tool',
        organic_research_positions: 'Organic Positions',
        organic_research_competitors: 'Organic Competitors',
        organic_research_pages: 'Organic Pages',
        advertising_research: 'Advertising Research',
        keyword_gap: 'Keyword Gap',
        backlink_overview: 'Backlink Overview',
        backlink_referring_domains: 'Referring Domains',
        position_tracking: 'Position Tracking',
        site_audit: 'Site Audit',
        domain_overview: 'Domain Overview',
        custom: 'Custom Export',
    };

    const sourceBadge = (source, fileType) => {
        const src = source || fileType || 'custom';
        const meta = sourceMeta[src] || sourceMeta.custom;
        return <span className={`badge ${meta.color}`}>{meta.icon} {meta.label}</span>;
    };

    const typeBadge = (t, source, fileType) => {
        // If we have source info from Research Hub, use source badge
        if (source) return sourceBadge(source, fileType);
        // Fallback to old Semrush type labels
        const colors = {
            keyword_overview: 'badge-blue', keyword_magic: 'badge-blue',
            organic_research_positions: 'badge-green', organic_research_competitors: 'badge-purple',
            advertising_research: 'badge-yellow', keyword_gap: 'badge-red',
            backlink_overview: 'badge-gray', position_tracking: 'badge-green',
        };
        return <span className={`badge ${colors[t] || 'badge-gray'}`}>{typeLabels[t] || t}</span>;
    };

    // --- Context Provider state ---
    const [contextCategories, setContextCategories] = useState([]);
    const [agentContextMap, setAgentContextMap] = useState([]);
    const [taggedFiles, setTaggedFiles] = useState([]);
    const [contextSummary, setContextSummary] = useState(null);
    const [taggingImport, setTaggingImport] = useState(null);
    const [selectedTags, setSelectedTags] = useState([]);
    const [tagPriority, setTagPriority] = useState(5);
    const [autoTagResult, setAutoTagResult] = useState(null);
    const [skillSyncResult, setSkillSyncResult] = useState(null);
    const [skillSyncing, setSkillSyncing] = useState(false);
    const [autoTagAllResult, setAutoTagAllResult] = useState(null);
    const [autoTagAllRunning, setAutoTagAllRunning] = useState(false);

    const syncSkills = async () => {
        setSkillSyncing(true);
        setSkillSyncResult(null);
        try {
            const res = await fetch(ML_API + '/v1/context/sync-skills', { method: 'POST' });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Sync failed');
            setSkillSyncResult(data);
            loadContext();
        } catch (e) {
            setSkillSyncResult({ error: e.message });
        }
        setSkillSyncing(false);
    };

    const autoTagAll = async () => {
        setAutoTagAllRunning(true);
        setAutoTagAllResult(null);
        try {
            const res = await fetch(ML_API + '/v1/context/auto-tag-all', { method: 'POST' });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Auto-tag failed');
            setAutoTagAllResult(data);
            loadContext();
            loadLibrary();
        } catch (e) {
            setAutoTagAllResult({ error: e.message });
        }
        setAutoTagAllRunning(false);
    };

    const loadContext = async () => {
        const [cats, agMap, summary, tagged] = await Promise.all([
            api('/v1/context/categories'),
            api('/v1/context/agent-map'),
            api('/v1/context/summary'),
            api('/v1/context/tagged'),
        ]);
        setContextCategories(cats?.categories || []);
        setAgentContextMap(agMap?.agents || []);
        setContextSummary(summary);
        setTaggedFiles(tagged?.tagged || []);
    };

    const handleTag = async () => {
        if (!taggingImport || selectedTags.length === 0) return;
        await fetch(`${ML_API}/v1/context/tag?import_id=${taggingImport.id}&priority=${tagPriority}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(selectedTags),
        });
        setTaggingImport(null);
        setSelectedTags([]);
        setAutoTagResult(null);
        loadContext();
        loadLibrary();
    };

    const handleAutoTag = async (imp) => {
        setTaggingImport(imp);
        setAutoTagResult(null);
        const result = await api(`/v1/context/auto-tag?import_id=${imp.id}`);
        setAutoTagResult(result);
        if (result?.suggested_tags) {
            setSelectedTags(result.suggested_tags.filter(t => t.score >= 2).map(t => t.tag));
        }
    };

    const handleUntag = async (importId) => {
        await fetch(`${ML_API}/v1/context/tag/${importId}`, { method: 'DELETE' });
        loadContext();
    };

    const tabs = [
        { id: 'library', label: 'Libreria Dati' },
        { id: 'context', label: '🧠 Contesto Agenti' },
        { id: 'search', label: 'Cerca Keyword' },
        { id: 'upload', label: 'Carica File' },
    ];

    return (
        <React.Fragment>
            <div className="page-header">
                <h2>Data Hub — Research Library</h2>
                <button className="btn btn-secondary" onClick={loadLibrary}>Aggiorna</button>
            </div>

            {/* Stats cards */}
            {stats && (
                <React.Fragment>
                    <div className="cards-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
                        <div className="card">
                            <div className="card-label">Dataset Importati</div>
                            <div className="card-value green">{stats.total_imports}</div>
                        </div>
                        <div className="card">
                            <div className="card-label">Righe Totali</div>
                            <div className="card-value">{fmt(stats.total_rows)}</div>
                        </div>
                        <div className="card">
                            <div className="card-label">Fonti Dati</div>
                            <div className="card-value">{stats.by_source ? Object.keys(stats.by_source).length : '—'}</div>
                        </div>
                        <div className="card">
                            <div className="card-label">Keyword Uniche</div>
                            <div className="card-value">{fmt(stats.unique_keywords)}</div>
                        </div>
                    </div>
                    {/* Source breakdown pills */}
                    {stats.by_source && Object.keys(stats.by_source).length > 0 && (
                        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'20px'}}>
                            <span onClick={() => setSourceFilter('')}
                                style={{padding:'5px 12px',borderRadius:'20px',fontSize:'11px',fontWeight:500,cursor:'pointer',
                                    background: !sourceFilter ? '#1e3a5f' : '#27272a',color: !sourceFilter ? '#60a5fa' : '#a1a1aa',
                                    border: !sourceFilter ? '1px solid #3b82f6' : '1px solid #3f3f46'}}>
                                Tutti ({stats.total_imports})
                            </span>
                            {Object.entries(stats.by_source).map(([src, srcData]) => (
                                <span key={src} onClick={() => setSourceFilter(sourceFilter === src ? '' : src)}
                                    style={{padding:'5px 12px',borderRadius:'20px',fontSize:'11px',fontWeight:500,cursor:'pointer',
                                        background: sourceFilter === src ? '#1e3a5f' : '#27272a',color: sourceFilter === src ? '#60a5fa' : '#a1a1aa',
                                        border: sourceFilter === src ? '1px solid #3b82f6' : '1px solid #3f3f46'}}>
                                    {(srcData && srcData.icon) || sourceMeta[src]?.icon || '📄'} {(srcData && srcData.label) || sourceMeta[src]?.label || src} ({typeof srcData === 'object' ? srcData.count : srcData})
                                </span>
                            ))}
                        </div>
                    )}
                </React.Fragment>
            )}

            {/* Tab navigation */}
            <div style={{display:'flex',gap:'4px',marginBottom:'20px',marginTop:'8px',borderBottom:'1px solid #27272a'}}>
                {tabs.map(t => (
                    <div key={t.id} onClick={()=>setActiveTab(t.id)}
                        style={{padding:'10px 16px',fontSize:'13px',cursor:'pointer',borderBottom: activeTab===t.id ? '2px solid #60a5fa' : '2px solid transparent',
                            color: activeTab===t.id ? '#60a5fa' : '#71717a', fontWeight: activeTab===t.id ? 500 : 400}}>
                        {t.label}
                    </div>
                ))}
            </div>

            {/* TAB: Upload */}
            {activeTab === 'upload' && (
                <React.Fragment>
                    <div className="card" style={{marginBottom:'20px',textAlign:'center',padding:'40px',border:'2px dashed #3f3f46',cursor:'pointer'}}
                        onClick={() => fileInputRef.current?.click()}>
                        <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls,.txt,.json,.pdf,.docx,.doc,.tsv" multiple onChange={handleUpload}
                            style={{display:'none'}} />
                        <div style={{fontSize:'40px',marginBottom:'12px'}}>📂</div>
                        <div style={{fontSize:'15px',color:'#fafafa',fontWeight:500,marginBottom:'8px'}}>
                            {uploading ? 'Caricamento in corso...' : 'Clicca o trascina file qui'}
                        </div>
                        <div style={{fontSize:'12px',color:'#71717a',lineHeight:'1.8'}}>
                            CSV, XLSX, PDF, DOCX, JSON, TXT — Riconoscimento automatico della fonte<br/>
                            📊 Semrush &nbsp; 📈 Google Analytics &nbsp; 💰 Google Ads &nbsp; 🔍 Search Console &nbsp; 🔗 Ahrefs &nbsp; 🐸 Screaming Frog &nbsp; 🛒 Shopify &nbsp; 📧 Klaviyo &nbsp; 📄 Custom
                        </div>
                        {uploading && <div style={{marginTop:'12px'}}><span className="spinner"></span></div>}
                    </div>

                    {uploadResult && (
                        <div className="card" style={{borderColor:'#166534'}}>
                            <h3 style={{fontSize:'14px',marginBottom:'12px',color:'#fafafa'}}>Risultati Import</h3>
                            {uploadResult.map((r, i) => (
                                <React.Fragment key={i}>
                                    <div style={{padding:'8px 0',borderBottom:'1px solid #1e1e21',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                        <div>
                                            <span style={{fontWeight:500,color:'#e4e4e7',fontSize:'13px'}}>{r.filename}</span>
                                            {(r.source || r.export_type) && <span style={{marginLeft:'8px'}}>{typeBadge(r.export_type, r.source, r.file_type)}</span>}
                                        </div>
                                        <div style={{display:'flex',gap:'8px',alignItems:'center',flexShrink:0}}>
                                            {r.rows_imported && <span style={{fontSize:'12px',color:'#4ade80'}}>{fmt(r.rows_imported)} righe</span>}
                                            <span className={`badge ${r.status === 'imported' ? 'badge-green' : 'badge-red'}`}>
                                                {r.status === 'imported' ? '✅ Importato' : '❌ Errore'}
                                            </span>
                                        </div>
                                    </div>
                                    {r.status === 'error' && r.error && (
                                        <div style={{fontSize:'11px',color:'#f87171',marginTop:'4px',paddingLeft:'8px',paddingBottom:'6px'}}>{r.error}</div>
                                    )}
                                </React.Fragment>
                            ))}
                        </div>
                    )}
                </React.Fragment>
            )}

            {/* TAB: Library */}
            {activeTab === 'library' && (
                <React.Fragment>
                    {loading ? (
                        <div style={{textAlign:'center',padding:'40px'}}><span className="spinner"></span></div>
                    ) : imports.length === 0 ? (
                        <div className="card" style={{textAlign:'center',padding:'40px',color:'#52525b'}}>
                            Nessun dato importato. Vai alla tab "Carica File" per importare dati da qualsiasi fonte (Semrush, GA4, Google Ads, Ahrefs, PDF, DOCX...).
                        </div>
                    ) : (
                        <React.Fragment>
                            <div className="table-wrap">
                                <div className="table-header">
                                    <h3>Dataset Importati ({imports.length})</h3>
                                </div>
                                <table>
                                    <thead><tr><th>File</th><th>Fonte</th><th>Tipo</th><th>Righe</th><th>Dettaglio</th><th>Importato</th><th>Azioni</th></tr></thead>
                                    <tbody>
                                        {imports.map(imp => (
                                            <tr key={imp.id} style={{cursor:'pointer',background: selectedImport?.id === imp.id ? '#1e1e21' : 'transparent'}}
                                                onClick={() => viewImport(imp)}>
                                                <td style={{fontWeight:500}}>{imp.metadata?.label || imp.label || imp.filename}</td>
                                                <td>{sourceBadge(imp.source, imp.file_type)}</td>
                                                <td style={{fontSize:'11px',color:'#a1a1aa'}}>{imp.category || imp.export_type || imp.file_type || '—'}</td>
                                                <td>{fmt(imp.rows_count || imp.row_count)}</td>
                                                <td style={{fontSize:'11px',color:'#71717a'}}>{imp.summary?.keywords ? `${fmt(imp.summary.keywords)} kw` : imp.summary?.word_count ? `${fmt(imp.summary.word_count)} parole` : '—'}</td>
                                                <td style={{fontSize:'12px',color:'#71717a'}}>{fmtDate(imp.imported_at)}</td>
                                                <td>
                                                    <div style={{display:'flex',gap:'4px'}}>
                                                        <button className="btn btn-secondary" style={{padding:'3px 8px',fontSize:'10px'}}
                                                            onClick={(e) => { e.stopPropagation(); handleAutoTag(imp); setActiveTab('context'); }}>
                                                            🏷️
                                                        </button>
                                                        <button className="btn btn-secondary" style={{padding:'3px 8px',fontSize:'10px',color:'#f87171'}}
                                                            onClick={(e) => { e.stopPropagation(); deleteImport(imp.id); }}>
                                                            Elimina
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Import detail panel */}
                            {selectedImport && (
                                <div className="card" style={{marginTop:'16px',borderColor:'#3b82f6'}}>
                                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                                        <h3 style={{fontSize:'14px',color:'#fafafa'}}>
                                            {selectedImport.metadata?.label || selectedImport.filename} — Dettaglio
                                        </h3>
                                        <div style={{display:'flex',gap:'6px'}}>
                                            {typeBadge(selectedImport.export_type, selectedImport.source, selectedImport.file_type)}
                                            <span className="badge badge-gray">{fmt(selectedImport.rows_count)} righe</span>
                                        </div>
                                    </div>

                                    {/* Top keywords */}
                                    {selectedImport.summary?.top_volume_keywords?.length > 0 && (
                                        <div style={{marginBottom:'12px'}}>
                                            <div style={{fontSize:'11px',color:'#52525b',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'6px'}}>Top keyword per volume</div>
                                            <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                                                {selectedImport.summary.top_volume_keywords.map((kw, i) => (
                                                    <span key={i} style={{fontSize:'11px',padding:'4px 10px',background:'#1e1e21',borderRadius:'6px',color:'#a1a1aa'}}>
                                                        {kw.keyword} <span style={{color:'#4ade80',fontWeight:600}}>{fmt(kw.volume)}</span>
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Data table */}
                                    {loadingData ? (
                                        <div style={{textAlign:'center',padding:'20px'}}><span className="spinner"></span></div>
                                    ) : importData?.data ? (
                                        <div style={{maxHeight:'350px',overflowY:'auto',border:'1px solid #1e1e21',borderRadius:'8px'}}>
                                            <table style={{fontSize:'11px'}}>
                                                <thead>
                                                    <tr>
                                                        {selectedImport.columns?.slice(0, 8).map(col => (
                                                            <th key={col} style={{position:'sticky',top:0,background:'#111113',zIndex:1}}>{col}</th>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {importData.data.slice(0, 100).map((row, i) => (
                                                        <tr key={i}>
                                                            {selectedImport.columns?.slice(0, 8).map(col => (
                                                                <td key={col} style={{fontSize:'11px',maxWidth:'200px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                                                                    {typeof row[col] === 'number' ? fmt(row[col]) : (row[col] || '—')}
                                                                </td>
                                                            ))}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            {importData.data.length > 100 && (
                                                <div style={{textAlign:'center',padding:'8px',fontSize:'11px',color:'#52525b'}}>
                                                    Mostrate 100 di {fmt(importData.data.length)} righe
                                                </div>
                                            )}
                                        </div>
                                    ) : null}
                                </div>
                            )}
                        </React.Fragment>
                    )}
                </React.Fragment>
            )}

            {/* TAB: Context (Agent Knowledge Bridge) */}
            {activeTab === 'context' && (
                <React.Fragment>
                    {!contextSummary && (() => { loadContext(); return null; })()}

                    {/* Context summary cards */}
                    {contextSummary && (
                        <div className="cards-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:'20px'}}>
                            <div className="card">
                                <div className="card-label">File Taggati</div>
                                <div className="card-value green">{contextSummary.tagged_imports}</div>
                                <div className="card-sub">su {contextSummary.total_imports_in_hub} importati</div>
                            </div>
                            <div className="card">
                                <div className="card-label">Non Taggati</div>
                                <div className="card-value yellow">{contextSummary.untagged_imports}</div>
                                <div className="card-sub">da classificare</div>
                            </div>
                            <div className="card">
                                <div className="card-label">Categorie Attive</div>
                                <div className="card-value">{contextSummary.categories_in_use}</div>
                                <div className="card-sub">su {contextSummary.categories_available} disponibili</div>
                            </div>
                            <div className="card">
                                <div className="card-label">Agenti Serviti</div>
                                <div className="card-value green">{agentContextMap.filter(a => a.total_context_files > 0).length}</div>
                                <div className="card-sub">su {agentContextMap.length} totali</div>
                            </div>
                        </div>
                    )}

                    {/* Skill Sync Section */}
                    <div className="card" style={{marginBottom:'20px',padding:'20px'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <div>
                                <h3 style={{fontSize:'14px',color:'#fafafa',marginBottom:'4px'}}>🧠 Sincronizza Skill Cowork</h3>
                                <div style={{fontSize:'12px',color:'#71717a'}}>
                                    Importa le skill AI (SEO Agent, MT Translator, MT Validator, MT Orchestrator) nel Data Hub per arricchire il contesto degli agenti.
                                </div>
                            </div>
                            <button className="btn btn-primary" style={{padding:'8px 20px',fontSize:'12px',whiteSpace:'nowrap'}}
                                onClick={syncSkills} disabled={skillSyncing}>
                                {skillSyncing ? '⏳ Sincronizzando...' : '🔄 Sincronizza Skill'}
                            </button>
                        </div>
                        {skillSyncResult && !skillSyncResult.error && (
                            <div style={{marginTop:'14px',padding:'12px',background:'#052e16',borderRadius:'8px',border:'1px solid #166534'}}>
                                <div style={{fontSize:'12px',color:'#4ade80',marginBottom:'6px'}}>✅ Sincronizzazione completata</div>
                                <div style={{display:'flex',gap:'20px',fontSize:'12px',color:'#a1a1aa'}}>
                                    <span>📥 Importati: <strong style={{color:'#4ade80'}}>{skillSyncResult.synced || 0}</strong></span>
                                    <span>⏭️ Già presenti: <strong style={{color:'#facc15'}}>{skillSyncResult.skipped || 0}</strong></span>
                                    {skillSyncResult.errors > 0 && <span>❌ Errori: <strong style={{color:'#f87171'}}>{skillSyncResult.errors}</strong></span>}
                                </div>
                                {skillSyncResult.details && skillSyncResult.details.length > 0 && (
                                    <div style={{marginTop:'10px',maxHeight:'120px',overflowY:'auto'}}>
                                        {skillSyncResult.details.map((d, i) => (
                                            <div key={i} style={{fontSize:'11px',color:'#4ade80',padding:'2px 0'}}>
                                                📥 {d.file} — {d.action === 're-tagged' ? 'ri-taggato' : 'importato e taggato'} ({(d.tags||[]).join(', ')})
                                            </div>
                                        ))}
                                        {(skillSyncResult.skipped_details||[]).map((d, i) => (
                                            <div key={'s'+i} style={{fontSize:'11px',color:'#facc15',padding:'2px 0'}}>
                                                ⏭️ {d.file} — {d.reason || 'saltato'}
                                            </div>
                                        ))}
                                        {(skillSyncResult.error_details||[]).map((d, i) => (
                                            <div key={'e'+i} style={{fontSize:'11px',color:'#f87171',padding:'2px 0'}}>
                                                ❌ {d.file} — {d.error || 'errore'}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                        {skillSyncResult?.error && (
                            <div style={{marginTop:'14px',padding:'12px',background:'#450a0a',borderRadius:'8px',border:'1px solid #991b1b'}}>
                                <div style={{fontSize:'12px',color:'#f87171'}}>❌ Errore: {skillSyncResult.error}</div>
                            </div>
                        )}
                    </div>

                    {/* Tagging modal */}
                    {taggingImport && (
                        <div className="card" style={{marginBottom:'20px',borderColor:'#8b5cf6',padding:'24px'}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                                <h3 style={{fontSize:'15px',color:'#fafafa'}}>
                                    🏷️ Tagga: {taggingImport.label || taggingImport.filename}
                                </h3>
                                <button className="btn btn-secondary" style={{padding:'4px 10px',fontSize:'11px'}}
                                    onClick={() => { setTaggingImport(null); setAutoTagResult(null); setSelectedTags([]); }}>✕ Chiudi</button>
                            </div>

                            {/* Auto-tag suggestions */}
                            {autoTagResult?.suggested_tags?.length > 0 && (
                                <div style={{marginBottom:'16px',padding:'12px',background:'#1e1e21',borderRadius:'8px'}}>
                                    <div style={{fontSize:'11px',color:'#a1a1aa',marginBottom:'8px'}}>🤖 Suggerimenti automatici (basati sul contenuto):</div>
                                    <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                                        {autoTagResult.suggested_tags.map(s => (
                                            <span key={s.tag} onClick={() => setSelectedTags(prev => prev.includes(s.tag) ? prev.filter(t => t !== s.tag) : [...prev, s.tag])}
                                                style={{padding:'4px 10px',borderRadius:'14px',fontSize:'11px',cursor:'pointer',
                                                    background: selectedTags.includes(s.tag) ? '#5b21b6' : '#27272a',
                                                    color: selectedTags.includes(s.tag) ? '#e9d5ff' : '#a1a1aa',
                                                    border: selectedTags.includes(s.tag) ? '1px solid #7c3aed' : '1px solid #3f3f46'}}>
                                                {s.label} ({s.score})
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* All categories */}
                            <div style={{fontSize:'11px',color:'#71717a',marginBottom:'8px'}}>Tutte le categorie:</div>
                            <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'16px'}}>
                                {contextCategories.map(cat => (
                                    <span key={cat.key} onClick={() => setSelectedTags(prev => prev.includes(cat.key) ? prev.filter(t => t !== cat.key) : [...prev, cat.key])}
                                        style={{padding:'5px 12px',borderRadius:'14px',fontSize:'11px',cursor:'pointer',
                                            background: selectedTags.includes(cat.key) ? '#5b21b6' : '#18181b',
                                            color: selectedTags.includes(cat.key) ? '#e9d5ff' : '#a1a1aa',
                                            border: selectedTags.includes(cat.key) ? '1px solid #7c3aed' : '1px solid #27272a'}}>
                                        {cat.icon} {cat.label}
                                    </span>
                                ))}
                            </div>

                            {/* Priority slider */}
                            <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px'}}>
                                <span style={{fontSize:'12px',color:'#a1a1aa'}}>Priorità:</span>
                                <input type="range" min="1" max="10" value={tagPriority} onChange={e => setTagPriority(parseInt(e.target.value))}
                                    style={{flex:1}} />
                                <span style={{fontSize:'13px',fontWeight:600,color: tagPriority >= 8 ? '#4ade80' : tagPriority >= 5 ? '#fbbf24' : '#a1a1aa'}}>
                                    {tagPriority}/10
                                </span>
                            </div>

                            <button className="btn btn-primary" onClick={handleTag} disabled={selectedTags.length === 0}>
                                🏷️ Salva Tag ({selectedTags.length} selezionati)
                            </button>
                        </div>
                    )}

                    {/* Agent context map */}
                    <div className="table-wrap" style={{marginBottom:'20px'}}>
                        <div className="table-header">
                            <h3>🧠 Mappa Contesto → Agenti</h3>
                        </div>
                        <table>
                            <thead><tr><th>Agente</th><th>Categorie Contesto</th><th>File Disponibili</th></tr></thead>
                            <tbody>
                                {agentContextMap.map(agent => (
                                    <tr key={agent.agent_id}>
                                        <td style={{fontWeight:500}}>{agent.agent_name}</td>
                                        <td>
                                            <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
                                                {agent.context_categories.map(cat => (
                                                    <span key={cat.category} style={{fontSize:'10px',padding:'2px 8px',borderRadius:'10px',
                                                        background: cat.files_available > 0 ? '#052e16' : '#1e1e21',
                                                        color: cat.files_available > 0 ? '#4ade80' : '#52525b'}}>
                                                        {cat.icon} {cat.label}
                                                    </span>
                                                ))}
                                            </div>
                                        </td>
                                        <td>
                                            <span className={`badge ${agent.total_context_files > 0 ? 'badge-green' : 'badge-gray'}`}>

                                            </span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* Tagged files list */}
                    <div className="table-wrap" style={{marginBottom:'20px'}}>
                        <div className="table-header">
                            <h3>🏷️ File Taggati ({taggedFiles.length})</h3>
                        </div>
                        {taggedFiles.length === 0 ? (
                            <div style={{padding:'32px',textAlign:'center',color:'#52525b',fontSize:'13px'}}>
                                Nessun file taggato. Vai alla tab "Libreria Dati" e clicca 🏷️ su un file per taggarlo.
                            </div>
                        ) : (
                            <table>
                                <thead><tr><th>File</th><th>Tag</th><th>Priorità</th><th>Azioni</th></tr></thead>
                                <tbody>
                                    {taggedFiles.map(f => (
                                        <tr key={f.id}>
                                            <td style={{fontWeight:500}}>{f.label || f.filename}</td>
                                            <td>
                                                <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>

                                                        <span key={i} className="badge badge-purple" style={{fontSize:'10px'}}>
                                                            {icon} {f.tag_labels?.[i]}
                                                        </span>
                                                    ))}
                                                </div>
                                            </td>
                                            <td><span style={{color: f.priority >= 8 ? '#4ade80' : f.priority >= 5 ? '#fbbf24' : '#a1a1aa',fontWeight:600}}>{f.priority}/10</span></td>
                                            <td>
                                                <div style={{display:'flex',gap:'4px'}}>
                                                    <button className="btn btn-secondary" style={{padding:'3px 8px',fontSize:'10px'}}
                                                        onClick={() => handleAutoTag(f)}>🏷️ Modifica</button>
                                                    <button className="btn btn-secondary" style={{padding:'3px 8px',fontSize:'10px',color:'#f87171'}}
                                                        onClick={() => handleUntag(f.id)}>Rimuovi</button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* Untagged files: show library items not yet tagged */}
                    {imports.filter(imp => !taggedFiles.some(t => t.id === imp.id)).length > 0 && (
                        <div className="table-wrap">
                            <div className="table-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <h3>📂 File Non Taggati — Da Classificare</h3>
                                <button className="btn btn-primary" style={{padding:'6px 16px',fontSize:'12px'}}
                                    onClick={autoTagAll} disabled={autoTagAllRunning}>
                                    {autoTagAllRunning ? '⏳ Analisi in corso...' : '🤖 Auto-Tag Tutti'}
                                </button>
                            </div>
                            {autoTagAllResult && !autoTagAllResult.error && (
                                <div style={{padding:'12px 16px',background:'#052e16',borderBottom:'1px solid #166534'}}>
