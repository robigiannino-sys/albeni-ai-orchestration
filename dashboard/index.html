                                        <span>⏭️ Già taggati: <strong style={{color:'#a1a1aa'}}>{autoTagAllResult.already_tagged}</strong></span>
                                        <span>❔ Nessun match: <strong style={{color:'#facc15'}}>{autoTagAllResult.no_match || 0}</strong></span>
                                        {autoTagAllResult.errors > 0 && <span>❌ Errori: <strong style={{color:'#f87171'}}>{autoTagAllResult.errors}</strong></span>}
                                    </div>
                                    {autoTagAllResult.details && autoTagAllResult.details.filter(d => d.status === 'tagged').length > 0 && (
                                        <div style={{marginTop:'8px',maxHeight:'100px',overflowY:'auto'}}>
                                            {autoTagAllResult.details.filter(d => d.status === 'tagged').map((d, i) => (
                                                <div key={i} style={{fontSize:'11px',color:'#4ade80',padding:'1px 0'}}>
                                                    🏷️ {d.filename} → {(d.tags_applied||[]).join(', ')} (priorità {d.priority})
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                            {autoTagAllResult?.error && (
                                <div style={{padding:'12px 16px',background:'#450a0a',borderBottom:'1px solid #991b1b'}}>
                                    <div style={{fontSize:'12px',color:'#f87171'}}>❌ Errore: {autoTagAllResult.error}</div>
                                </div>
                            )}
                            <table>
                                <thead><tr><th>File</th><th>Fonte</th><th>Righe</th><th>Azioni</th></tr></thead>
                                <tbody>
                                    {imports.filter(imp => !taggedFiles.some(t => t.id === imp.id)).map(imp => (
                                        <tr key={imp.id}>
                                            <td style={{fontWeight:500}}>{imp.label || imp.metadata?.label || imp.filename}</td>
                                            <td>{sourceBadge(imp.source, imp.file_type)}</td>
                                            <td>{fmt(imp.rows_count || imp.row_count)}</td>
                                            <td>
                                                <button className="btn btn-primary" style={{padding:'4px 12px',fontSize:'11px'}}
                                                    onClick={() => handleAutoTag(imp)}>
                                                    🤖 Auto-Tag
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </React.Fragment>
            )}

            {/* TAB: Search */}
            {activeTab === 'search' && (
                <React.Fragment>
                    <div className="card" style={{marginBottom:'16px',display:'flex',gap:'12px',alignItems:'center'}}>
                        <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && searchKeywords()}
                            placeholder="Cerca keyword in tutti i dataset importati (es: merino, wool, lana...)"
                            style={{flex:1,background:'#27272a',color:'#e4e4e7',border:'1px solid #3f3f46',borderRadius:'6px',padding:'10px 14px',fontSize:'13px',outline:'none'}} />
                        <button className="btn btn-primary" onClick={searchKeywords} disabled={searchLoading}>
                            {searchLoading ? <span className="spinner"></span> : '🔎 Cerca'}
                        </button>
                    </div>

                    {searchResults && (
                        <div className="table-wrap">
                            <div className="table-header">
                                <h3>Risultati per "{searchResults.query}" ({searchResults.total})</h3>
                            </div>
                            <table>
                                <thead><tr><th>Keyword</th><th>Volume</th><th>KD</th><th>CPC</th><th>Position</th><th>Fonte</th></tr></thead>
                                <tbody>
                                    {searchResults.results?.slice(0, 50).map((r, i) => (
                                        <tr key={i}>
                                            <td style={{fontWeight:500}}>{r.keyword || '—'}</td>
                                            <td style={{color:'#4ade80'}}>{fmt(r.volume)}</td>
                                            <td><span className={`badge ${(r.kd||0) > 60 ? 'badge-red' : (r.kd||0) > 30 ? 'badge-yellow' : 'badge-green'}`}>{r.kd || '—'}</span></td>
                                            <td>{typeof r.cpc === 'number' ? `€${r.cpc.toFixed(2)}` : '—'}</td>
                                            <td>{r.position || '—'}</td>
                                            <td style={{fontSize:'11px',color:'#52525b'}}>{r._source_file || '—'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {!searchResults && (
                        <div className="card" style={{textAlign:'center',padding:'40px',color:'#52525b'}}>
                            Cerca keyword e contenuti in tutti i dataset importati. I risultati verranno ordinati per rilevanza e volume.
                        </div>
                    )}
                </React.Fragment>
            )}
        </React.Fragment>
    );
}

    const runTask = async (agent, task) => {

        setRunning(taskKey);
        setTaskResult(null);

        const logEntry = {
            time: new Date().toLocaleTimeString('it-IT'),
            agent: agent.name,
            task: task.label,
            status: 'running',
        };
        setTaskLog(prev => [logEntry, ...prev].slice(0, 50));

        const startTime = Date.now();
        let result;
        if (task.method === 'GET') {
            result = await api(task.endpoint);
        } else {
            result = await api(task.endpoint, {
                method: task.method,
                body: task.body ? JSON.stringify(task.body) : undefined,
            });
        }
        const elapsed = Date.now() - startTime;

        const completedLog = {
            time: new Date().toLocaleTimeString('it-IT'),
            agent: agent.name,
            task: task.label,
            status: result && !result.error ? 'success' : 'error',
            latency: elapsed,
        };
        setTaskLog(prev => [completedLog, ...prev.filter(l => l !== logEntry)].slice(0, 50));

        setTaskResult({ agent: agent.name, task: task.label, data: result, latency: elapsed });
        setRunning(null);
    };

                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </React.Fragment>

                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}}>
                            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>

                                    <div style={{fontWeight:600,color:'#fafafa',fontSize:'14px'}}>{agent.name}</div>

                            </span>
                        </div>

                        <div style={{display:'flex',flexWrap:'wrap',gap:'4px',marginBottom:'10px'}}>
                            {agent.capabilities.slice(0, 4).map((cap, i) => (
                                <span key={i} style={{fontSize:'10px',padding:'2px 8px',borderRadius:'4px',background:'#1e1e21',color:'#71717a'}}>{cap}</span>
                            ))}

                                <span style={{fontSize:'10px',padding:'2px 8px',borderRadius:'4px',background:'#1e1e21',color:'#52525b'}}>+{agent.capabilities.length - 4}</span>
                            )}
                        </div>

                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid #1e1e21',paddingTop:'10px'}}>
                            <span style={{fontSize:'11px',color:'#52525b'}}>{agent.metrics.kpi}: <span style={{color:'#a1a1aa'}}>{agent.metrics.target}</span></span>
                            {agent.tasks.length > 0 && (
                                <span style={{fontSize:'11px',color:'#3b82f6'}}>{agent.tasks.length} task →</span>
                            )}
                        </div>
                    </div>
                ))}
            </div>
            )} {/* end orchestration tab */}

            {/* Selected Agent Detail Panel - only in orchestration tab */}
            {agentTab === 'orchestration' && selectedAgent && selectedAgent.tasks.length > 0 && (
                <div className="card" style={{marginBottom:'28px',borderColor:'#3b82f6'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px'}}>
                        <span style={{fontSize:'28px'}}>{selectedAgent.icon}</span>
                        <div>
                            <h3 style={{fontSize:'16px',fontWeight:600,color:'#fafafa'}}>{selectedAgent.name} — Task Disponibili</h3>
                            <div style={{fontSize:'12px',color:'#52525b'}}>{selectedAgent.layer} | {selectedAgent.capabilities.length} capabilities</div>
                        </div>
                    </div>

                    <div style={{display:'grid',gap:'8px'}}>
                        {selectedAgent.tasks.map(task => {
                            const taskKey = `${selectedAgent.id}_${task.key}`;
                            const isRunning = running === taskKey;
                            return (
                                <div key={task.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:'#111113',borderRadius:'8px',border:'1px solid #1e1e21'}}>
                                    <div>
                                        <div style={{fontWeight:500,fontSize:'13px',color:'#e4e4e7'}}>{task.label}</div>
                                        <div style={{fontSize:'11px',color:'#52525b',marginTop:'2px'}}>{task.description}</div>
                                        <div style={{fontSize:'10px',color:'#3f3f46',marginTop:'2px',fontFamily:'monospace'}}>{task.method} {task.endpoint}</div>
                                    </div>
                                    <button className="btn btn-primary" style={{padding:'6px 14px',fontSize:'12px',whiteSpace:'nowrap'}}
                                        onClick={(e) => { e.stopPropagation(); runTask(selectedAgent, task); }}
                                        disabled={isRunning}>
                                        {isRunning ? <React.Fragment><span className="spinner" style={{marginRight:'6px'}}></span> Running...</React.Fragment> : '▶ Esegui'}
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}

            {/* Task Result - only in orchestration tab */}
            {agentTab === 'orchestration' && taskResult && (
                <div className="card" style={{marginBottom:'28px',borderColor: taskResult.data && !taskResult.data.error ? '#166534' : '#7f1d1d'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                        <h3 style={{fontSize:'14px',color:'#fafafa'}}>{taskResult.agent} → {taskResult.task}</h3>
                        <div style={{display:'flex',gap:'8px'}}>
                            <span className={`badge ${taskResult.data && !taskResult.data.error ? 'badge-green' : 'badge-red'}`}>
                                {taskResult.data && !taskResult.data.error ? '✅ Successo' : '❌ Errore'}
                            </span>
                            <span className="badge badge-gray">{taskResult.latency}ms</span>
                        </div>
                    </div>
                    <pre style={{background:'#111113',padding:'16px',borderRadius:'8px',fontSize:'11px',color:'#d4d4d8',whiteSpace:'pre-wrap',maxHeight:'300px',overflowY:'auto',fontFamily:'SF Mono, monospace'}}>
                        {JSON.stringify(taskResult.data, null, 2)}
                    </pre>
                </div>
            )}

            {/* Task Execution Log - only in orchestration tab */}
            {agentTab === 'orchestration' && taskLog.length > 0 && (
                <div className="table-wrap">
                    <div className="table-header">
                        <h3>Log Esecuzioni ({taskLog.length})</h3>
                        <button className="btn btn-secondary" style={{padding:'4px 12px',fontSize:'11px'}} onClick={() => setTaskLog([])}>Pulisci</button>
                    </div>
                    <table>
                        <thead><tr><th>Orario</th><th>Agente</th><th>Task</th><th>Stato</th><th>Latenza</th></tr></thead>
                        <tbody>
                            {taskLog.map((log, i) => (
                                <tr key={i}>
                                    <td style={{fontFamily:'monospace',fontSize:'12px',color:'#52525b'}}>{log.time}</td>
                                    <td style={{fontWeight:500}}>{log.agent}</td>
                                    <td>{log.task}</td>
                                    <td>
                                        <span className={`badge ${log.status==='success'?'badge-green':log.status==='error'?'badge-red':'badge-yellow'}`}>
                                            {log.status === 'success' ? '✅ OK' : log.status === 'error' ? '❌ Error' : '⏳ Running'}
                                        </span>
                                    </td>
                                    <td style={{fontFamily:'monospace'}}>{log.latency ? `${log.latency}ms` : '—'}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            )}
        </React.Fragment>
    );
}

    useEffect(() => {
        if (scrollRef.current) {
            scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
    }, [history]);

    const executeCommand = async (cmd) => {
        if (!cmd.trim()) return;

        // Add user message
        const userMsg = { type: 'user', text: cmd, time: new Date().toLocaleTimeString('it-IT') };
        setHistory(prev => [...prev, userMsg]);
        setCmdHistory(prev => [cmd, ...prev].slice(0, 50));
        setHistoryIndex(-1);
        setInput('');
        setLoading(true);

        try {
            // POST with explicit empty JSON body — without it, FastAPI/uvicorn
            // rejects with "Invalid HTTP request received." (Content-Type declared
            // application/json but no body present). The endpoint takes `command`
            // as query string, so the body itself is unused.
            const res = await fetch(`${ML_API}/v1/terminal/execute?command=${encodeURIComponent(cmd)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: '{}',
            });
            // Defensive parse: if upstream returned plain text (proxy / 4xx error),
            // surface the actual text instead of throwing on JSON.parse.
            const raw = await res.text();
            let data;
            try {
                data = JSON.parse(raw);
            } catch (e) {
                throw new Error(`Backend returned non-JSON (HTTP ${res.status}): ${raw.substring(0, 200)}`);
            }

            if (data.response) {
                // Help or text response
                setHistory(prev => [...prev, {
                    type: 'response',
                    agent: data.agent || 'Sistema',
                    text: data.response,
                    latency: data.latency_ms,
                    time: new Date().toLocaleTimeString('it-IT'),
                }]);
            } else if (data.error) {
                setHistory(prev => [...prev, {
                    type: 'error',
                    agent: data.agent || 'Sistema',
                    text: `Errore: ${data.error}`,
                    latency: data.latency_ms,
                    time: new Date().toLocaleTimeString('it-IT'),
                }]);
            } else {
                // Result: could be AI text response or structured JSON
                const isTextResponse = typeof data.result === 'string';
                setHistory(prev => [...prev, {
                    type: isTextResponse ? 'response' : 'result',
                    agent: data.agent || '?',
                    action: data.action,
                    text: isTextResponse ? data.result : undefined,
                    data: isTextResponse ? undefined : data.result,
                    latency: data.latency_ms,
                    time: new Date().toLocaleTimeString('it-IT'),
                }]);
            }
        } catch (e) {
            setHistory(prev => [...prev, {
                type: 'error',
                agent: 'Sistema',
                text: `Connessione fallita: ${e.message}. Verifica che i container Docker siano attivi.`,
                time: new Date().toLocaleTimeString('it-IT'),
            }]);
        }

        setLoading(false);
        if (inputRef.current) inputRef.current.focus();
    };

    const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            executeCommand(input);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (cmdHistory.length > 0) {
                const newIndex = Math.min(historyIndex + 1, cmdHistory.length - 1);
                setHistoryIndex(newIndex);
                setInput(cmdHistory[newIndex]);
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex > 0) {
                const newIndex = historyIndex - 1;
                setHistoryIndex(newIndex);
                setInput(cmdHistory[newIndex]);
            } else {
                setHistoryIndex(-1);
                setInput('');
            }
        }
    };

    const quickCommands = [
        { label: 'Status', cmd: 'status' },
        { label: 'Pipeline', cmd: 'pipeline' },
        { label: 'Overview SEO', cmd: 'overview' },
        { label: 'Balance 85/15', cmd: 'balance' },
        { label: 'Benchmark', cmd: 'benchmark' },
        { label: 'Contesto', cmd: 'contesto' },
        { label: 'Agenti', cmd: 'agenti' },
        { label: '💡 Strategia SEO+Paid', cmd: 'implementa una strategia SEO e Paid per i 5 mercati con budget €2500/mese per 6 mesi, con focus su keyword a bassa competizione per i primi 3 mesi' },
        { label: '💡 Piano Editoriale', cmd: 'suggerisci un piano editoriale per i prossimi 3 mesi per tutti e 4 i domini, con focus sul mercato tedesco e il cluster business_professional' },
    ];

    const renderMessage = (msg, i) => {
        if (msg.type === 'user') {
            return (
                <div key={i} style={{display:'flex',justifyContent:'flex-end',marginBottom:'12px'}}>
                    <div style={{maxWidth:'75%',background:'#1e3a5f',borderRadius:'12px 12px 4px 12px',padding:'10px 14px'}}>
                        <div style={{fontSize:'13px',color:'#e4e4e7'}}>{msg.text}</div>
                        <div style={{fontSize:'10px',color:'#52525b',marginTop:'4px',textAlign:'right'}}>{msg.time}</div>
                    </div>
                </div>
            );
        }

        if (msg.type === 'system') {
            return (
                <div key={i} style={{display:'flex',justifyContent:'flex-start',marginBottom:'12px'}}>
                    <div style={{maxWidth:'85%',background:'#18181b',border:'1px solid #27272a',borderRadius:'12px 12px 12px 4px',padding:'10px 14px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'4px'}}>
                            <span style={{fontSize:'10px',padding:'2px 6px',background:'#27272a',borderRadius:'4px',color:'#a1a1aa',fontWeight:600}}>{msg.agent}</span>
                        </div>
                        <div style={{fontSize:'13px',color:'#a1a1aa',whiteSpace:'pre-wrap',lineHeight:'1.6'}}>{msg.text}</div>
                        <div style={{fontSize:'10px',color:'#3f3f46',marginTop:'4px'}}>{msg.time}</div>
                    </div>
                </div>
            );
        }

        if (msg.type === 'error') {
            return (
                <div key={i} style={{display:'flex',justifyContent:'flex-start',marginBottom:'12px'}}>
                    <div style={{maxWidth:'85%',background:'#1c1012',border:'1px solid #450a0a',borderRadius:'12px 12px 12px 4px',padding:'10px 14px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'4px'}}>
                            <span style={{fontSize:'10px',padding:'2px 6px',background:'#450a0a',borderRadius:'4px',color:'#fca5a5',fontWeight:600}}>{msg.agent}</span>
                            {msg.latency && <span style={{fontSize:'10px',color:'#52525b'}}>{msg.latency}ms</span>}
                        </div>
                        <div style={{fontSize:'13px',color:'#f87171'}}>{msg.text}</div>
                        <div style={{fontSize:'10px',color:'#3f3f46',marginTop:'4px'}}>{msg.time}</div>
                    </div>
                </div>
            );
        }

        // type === 'result' or 'response'
        const agentColors = {
            'Notion Sync': '#8b5cf6',
            'Content Validator': '#22c55e',
            'Content AI Layer': '#3b82f6',
            'Semrush Specialist': '#f97316',
            'Context Provider': '#a78bfa',
            'Data Hub': '#22d3ee',
            'AI Strategy Director': '#f59e0b',
            'AI Router': '#14b8a6',
            'Klaviyo CRM Sync': '#ec4899',
            'SEO Semantic Brain': '#06b6d4',
            'Intent Engine': '#eab308',
            'Cluster Predictor': '#a855f7',
            'AI Routing Layer': '#14b8a6',
            'Sistema': '#6b7280',
            'System': '#6b7280',
        };
        const agentColor = agentColors[msg.agent] || '#60a5fa';

        return (
            <div key={i} style={{display:'flex',justifyContent:'flex-start',marginBottom:'12px'}}>
                <div style={{maxWidth:'85%',background:'#18181b',border:`1px solid ${agentColor}33`,borderRadius:'12px 12px 12px 4px',padding:'10px 14px',width:'100%'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'6px'}}>
                        <span style={{fontSize:'10px',padding:'2px 8px',background:`${agentColor}22`,borderRadius:'4px',color:agentColor,fontWeight:600}}>{msg.agent}</span>
                        {msg.action && <span style={{fontSize:'10px',color:'#52525b'}}>{msg.action}</span>}
                        {msg.latency && <span style={{fontSize:'10px',color:'#52525b',marginLeft:'auto'}}>{msg.latency}ms</span>}
                    </div>
                    {msg.text ? (
                        <div style={{fontSize:'13px',color:'#a1a1aa',whiteSpace:'pre-wrap',lineHeight:'1.6'}}>{msg.text}</div>
                    ) : (
                        <pre style={{fontSize:'11px',color:'#d4d4d8',whiteSpace:'pre-wrap',maxHeight:'250px',overflowY:'auto',background:'#111113',padding:'10px',borderRadius:'6px',fontFamily:'SF Mono, Menlo, monospace',margin:0}}>
                            {JSON.stringify(msg.data, null, 2)}
                        </pre>
                    )}
                    <div style={{fontSize:'10px',color:'#3f3f46',marginTop:'4px'}}>{msg.time}</div>
                </div>
            </div>
        );
    };

    return (
        <React.Fragment>
            <div className="page-header">
                <h2>Terminale AI</h2>
                <div className="btn-group">
                    <button className="btn btn-secondary" style={{padding:'6px 12px',fontSize:'11px'}} onClick={() => {
                        fetch(ML_API + '/v1/terminal/history', {method:'DELETE'}).catch(() => {});
                        setHistory([
                            { type: 'system', agent: 'Sistema', text: 'Terminale pulito. Cronologia conversazione resettata.', time: new Date().toLocaleTimeString('it-IT') }
                        ]);
                    }}>Pulisci</button>
                </div>
            </div>

            {/* Quick commands */}
            <div style={{display:'flex',gap:'6px',marginBottom:'16px',flexWrap:'wrap'}}>
                {quickCommands.map(qc => (
                    <button key={qc.cmd} className="btn btn-secondary" style={{padding:'5px 12px',fontSize:'11px',borderRadius:'20px'}}
                        onClick={() => executeCommand(qc.cmd)} disabled={loading}>
                        {qc.label}
                    </button>
                ))}
            </div>

            {/* Chat area */}
            <div style={{background:'#111113',border:'1px solid #27272a',borderRadius:'12px',display:'flex',flexDirection:'column',height:'calc(100vh - 220px)'}}>
                {/* Messages */}
                <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'20px'}}>
                    {history.map((msg, i) => renderMessage(msg, i))}
                    {loading && (
                        <div style={{display:'flex',justifyContent:'flex-start',marginBottom:'12px'}}>
                            <div style={{background:'#18181b',border:'1px solid #27272a',borderRadius:'12px 12px 12px 4px',padding:'12px 16px',display:'flex',alignItems:'center',gap:'8px'}}>
                                <span className="spinner"></span>
                                <span style={{fontSize:'12px',color:'#71717a'}}>Elaborando...</span>
                            </div>
                        </div>
                    )}
                </div>

                {/* Input area */}
                <div style={{borderTop:'1px solid #27272a',padding:'12px 16px',display:'flex',gap:'10px',alignItems:'center'}}>
                    <div style={{position:'relative',flex:1}}>
                        <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKeyDown}
                            placeholder="Scrivi un comando... (es: 'quanti task sono pendenti?', 'keyword merino wool', 'benchmark')"
                            disabled={loading}
                            style={{width:'100%',background:'#18181b',color:'#e4e4e7',border:'1px solid #3f3f46',borderRadius:'8px',padding:'12px 16px',fontSize:'13px',outline:'none',fontFamily:'Inter, sans-serif'}} />
                    </div>
                    <button className="btn btn-primary" onClick={() => executeCommand(input)} disabled={loading || !input.trim()} style={{padding:'12px 20px'}}>
                        {loading ? <span className="spinner"></span> : '→'}
                    </button>
                </div>
            </div>
        </React.Fragment>
    );
}

function ContentLibraryPage() {
    const [entries, setEntries] = React.useState([]);
    const [stats, setStats] = React.useState(null);
    const [search, setSearch] = React.useState('');
    const [filterType, setFilterType] = React.useState('all');
    const [filterLang, setFilterLang] = React.useState('all');
    const [filterStatus, setFilterStatus] = React.useState('all');
    const [filterCluster, setFilterCluster] = React.useState('all');
    const [selected, setSelected] = React.useState(null);
    const [copied, setCopied] = React.useState(false);
    const [loading, setLoading] = React.useState(false);
    const [updatingStatus, setUpdatingStatus] = React.useState(false);

    const TYPE_LABELS = {
        'email_copy': '📧 Email Copy', 'blog_draft': '📝 Blog Draft',
        'landing_copy': '🎯 Landing Copy', 'lead_magnet': '🧲 Lead Magnet'
    };
    const TYPE_COLORS = {
        'email_copy': '#facc15', 'blog_draft': '#60a5fa',
        'landing_copy': '#f472b6', 'lead_magnet': '#4ade80'
    };
    const STATUS_COLORS = {
        'pending': '#f59e0b', 'approved': '#22c55e', 'rejected': '#ef4444', 'revised': '#8b5cf6'
    };
    const clusters = ['business_professional','heritage_mature','conscious_premium','modern_minimalist','italian_authentic'];
    const types = ['email_copy','blog_draft','landing_copy','lead_magnet'];
    const langs = ['it','en','de','fr','es'];

    const load = async () => {
        setLoading(true);
        try {
            const params = new URLSearchParams();
            params.set('limit', '200');
            if (filterType !== 'all') params.set('content_type', filterType);
            if (filterLang !== 'all') params.set('language', filterLang);
            if (filterStatus !== 'all') params.set('status', filterStatus);
            if (filterCluster !== 'all') params.set('cluster', filterCluster);
            if (search) params.set('search', search);

            const [data, st] = await Promise.all([
                api(`/v1/content/lake?${params.toString()}`),
                api('/v1/content/lake/stats/summary')
            ]);
            setEntries(data?.items || []);
            setStats(st);
        } catch(e) { console.error('Content Lake load error:', e); }
        setLoading(false);
    };

    React.useEffect(() => { load(); }, [filterType, filterLang, filterStatus, filterCluster]);

    const doSearch = () => { load(); };

    const updateReviewStatus = async (id, newStatus) => {
        setUpdatingStatus(true);
        await api(`/v1/content/lake/${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ review_status: newStatus, reviewer: 'admin' })
        });
        if (selected?.id === id) setSelected({...selected, review_status: newStatus});
        await load();
        setUpdatingStatus(false);
    };

    const fmtDate = d => { try { return new Date(d).toLocaleString('it-IT', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch { return d; } };
    const getTitle = (e) => {
        try {
            const gc = typeof e.content === 'string' ? JSON.parse(e.content) : e.content;
            if (gc?.subject) return gc.subject;
            if (gc?.headline) return gc.headline;
            if (gc?.title) return gc.title;
        } catch {}
        return `${(e.content_type||'').replace(/_/g,' ')} · ${e.cluster?.replace(/_/g,' ')} · ${e.language?.toUpperCase()}`;
    };
    const getPreview = (e) => {
        if (!e.content) return '—';
        const str = typeof e.content === 'string' ? e.content : JSON.stringify(e.content);
        return str.replace(/[{}"\[\]]/g,' ').replace(/\s+/g,' ').trim().substring(0, 160) + '…';
    };
    const getBody = (e) => {
        if (!e.content) return '—';
        try {
            const parsed = typeof e.content === 'string' ? JSON.parse(e.content) : e.content;
            return JSON.stringify(parsed, null, 2);
        } catch { return e.content; }
    };
    const copyBody = () => {
        if (!selected) return;
        navigator.clipboard.writeText(getBody(selected)).then(() => { setCopied(true); setTimeout(()=>setCopied(false),2000); });
    };

    return (
        <React.Fragment>
            <div className="page-header">
                <div>
                    <h2>🗄️ Content Lake</h2>
                    <p style={{fontSize:'12px',color:'#71717a',marginTop:'4px'}}>
                        Repository persistente di tutti i contenuti generati — salvati in PostgreSQL
                    </p>
                </div>
                <button className="btn btn-primary" onClick={load} disabled={loading}>
                    {loading ? <React.Fragment><span className="spinner" style={{marginRight:'6px'}}></span>Caricando...</React.Fragment> : '🔄 Aggiorna'}
                </button>
            </div>

            {/* Stats from DB */}
            {stats && (
                <div className="cards-grid" style={{gridTemplateColumns:'repeat(6,1fr)',marginBottom:'20px'}}>
                    <div className="card">
                        <div className="card-label">Totale generati</div>
                        <div className="card-value">{stats.total}</div>
                    </div>
                    <div className="card">
                        <div className="card-label">In attesa</div>
                        <div className="card-value yellow">{stats.pending}</div>
                    </div>
                    <div className="card">

            <div style={{display:'flex',gap:'10px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center'}}>

            {/* DETAIL MODAL */}
            {selected && (

                                <div style={{display:'flex',gap:'10px',flexWrap:'wrap',alignItems:'center'}}>

                        <div style={{padding:'16px 24px',borderTop:'1px solid #3f3f46',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <div style={{display:'flex',gap:'8px'}}>

                    </div>
                </div>
            )}
        </React.Fragment>
    );
}

// ============================================================
// GSC INDEXING MONITOR PAGE
// ============================================================
function GSCPage() {
    const [scans, setScans] = useState([]);
    const [loading, setLoading] = useState(true);
    const [filter, setFilter] = useState('all');
    const chartRef = useRef(null);
    const chartInstance = useRef(null);

    useEffect(() => {
        loadData();
    }, []);

    useEffect(() => {
        if (scans.length > 0) renderChart();
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
    }, [scans, filter]);

    async function loadData() {
        setLoading(true);
        try {
            const res = await api('/v1/gsc/history');
            setScans(res.scans || []);
        } catch (e) {
            console.error('GSC load error:', e);
        }
        setLoading(false);
    }

    function getFiltered() {
        if (filter === 'all') return scans;
        return scans.filter(s => s.site.includes(filter));
    }

    function getLatest(site) {
        return scans.find(s => s.site.includes(site));
    }

    function getHistory(site) {
        return scans.filter(s => s.site.includes(site)).sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function pct(n, total) {
        if (!total) return '—';
        return (n / total * 100).toFixed(1) + '%';
    }

    function renderChart() {
        if (!chartRef.current) return;
        if (chartInstance.current) chartInstance.current.destroy();

        const muHistory = getHistory('merinouniversity');
        const womHistory = getHistory('worldofmerino');

        // Collect all unique dates
        const allDates = [...new Set([...muHistory.map(s => s.date), ...womHistory.map(s => s.date)])].sort();

        const muData = allDates.map(d => {
            const s = muHistory.find(x => x.date === d);
            return s ? (s.indexed / s.total_urls * 100) : null;
        });
        const womData = allDates.map(d => {
            const s = womHistory.find(x => x.date === d);
            return s ? (s.indexed / s.total_urls * 100) : null;
        });

        const datasets = [];
        if (filter === 'all' || filter === 'merinouniversity') {
            datasets.push({
                label: 'MU — Indexed %',
                data: muData,
                borderColor: '#60a5fa',
                backgroundColor: 'rgba(96,165,250,0.1)',
                fill: true,
                tension: 0.3,
                spanGaps: true,
                pointRadius: 5,
                pointBackgroundColor: '#60a5fa'
            });
        }
        if (filter === 'all' || filter === 'worldofmerino') {
            datasets.push({
                label: 'WoM — Indexed %',
                data: womData,
                borderColor: '#f59e0b',
                backgroundColor: 'rgba(245,158,11,0.1)',
                fill: true,
                tension: 0.3,
                spanGaps: true,
                pointRadius: 5,
                pointBackgroundColor: '#f59e0b'
            });
        }

        chartInstance.current = new Chart(chartRef.current, {
            type: 'line',
            data: { labels: allDates, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#a1a1aa', font: { size: 12 } } },
                    tooltip: {
                        callbacks: {
                            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)}%`
                        }
                    }
                },
                scales: {
                    x: { ticks: { color: '#71717a' }, grid: { color: '#1e1e21' } },
                    y: {
                        min: 0, max: 100,
                        ticks: { color: '#a1a1aa', callback: v => v + '%' },
                        grid: { color: '#1e1e21' }
                    }
                }
            }
        });
    }

    const muLatest = getLatest('merinouniversity');
    const womLatest = getLatest('worldofmerino');

    return (
        <React.Fragment>
            <div className="page-header">
                <h2>📊 GSC Indexing Monitor</h2>
                <button className="refresh-btn" onClick={loadData}>
                    {loading ? <span className="spinner"></span> : '🔄 Aggiorna'}
                </button>
            </div>

            {/* KPI Cards */}
            <div className="cards-grid">
                <div className="card">
                    <div className="card-label">MU — Indexed</div>
                    <div className={`card-value ${muLatest?.indexed > 20 ? 'green' : muLatest?.indexed > 0 ? 'yellow' : 'red'}`}>
                        {muLatest ? muLatest.indexed : '—'}
                    </div>
                    <div className="card-sub">{muLatest ? `su ${muLatest.total_urls} URL (${pct(muLatest.indexed, muLatest.total_urls)})` : 'Nessuna scansione'}</div>
                </div>
                <div className="card">
                    <div className="card-label">WoM — Indexed</div>
                    <div className={`card-value ${womLatest?.indexed > 20 ? 'green' : womLatest?.indexed > 0 ? 'yellow' : 'red'}`}>
                        {womLatest ? womLatest.indexed : '—'}
                    </div>
                    <div className="card-sub">{womLatest ? `su ${womLatest.total_urls} URL (${pct(womLatest.indexed, womLatest.total_urls)})` : 'In attesa scansione'}</div>
                </div>
                <div className="card">
                    <div className="card-label">MU — Not Crawled</div>
                    <div className="card-value red">{muLatest ? muLatest.not_crawled : '—'}</div>
                    <div className="card-sub">{muLatest ? pct(muLatest.not_crawled, muLatest.total_urls) + ' del totale' : ''}</div>
                </div>
                <div className="card">
                    <div className="card-label">Scansioni Totali</div>
                    <div className="card-value">{scans.length}</div>
                    <div className="card-sub">{scans.length > 0 ? `Ultima: ${scans[0]?.date}` : 'Nessun dato'}</div>
                </div>
            </div>

            {/* Progression Chart */}
            <div className="chart-card" style={{marginBottom:'28px'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px'}}>
                    <h3>Progressione Indicizzazione</h3>
                    <div style={{display:'flex', gap:'8px'}}>
                        {['all','merinouniversity','worldofmerino'].map(f => (
                            <button key={f} onClick={()=>setFilter(f)}
                                className={filter === f ? 'btn btn-primary' : 'btn btn-secondary'}
                                style={{padding:'5px 12px', fontSize:'12px'}}>
                                {f === 'all' ? 'Tutti' : f === 'merinouniversity' ? 'MU' : 'WoM'}
                            </button>
                        ))}
                    </div>
                </div>
                <div style={{height:'300px', position:'relative'}}>
                    <canvas ref={chartRef}></canvas>
                </div>
                {scans.length < 2 && (
                    <div style={{textAlign:'center', padding:'12px', color:'#71717a', fontSize:'12px', marginTop:'8px'}}>
                        ℹ️ Il grafico mostrerà la progressione dopo almeno 2 scansioni mensili
                    </div>
                )}
            </div>

            {/* Detail Table */}
            <div className="table-wrap">
                <div className="table-header">
                    <h3>Storico Scansioni</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Sito</th>
                            <th>URL Totali</th>
                            <th>Indexed</th>
                            <th>%</th>
                            <th>Crawled (non indexed)</th>
                            <th>Not Crawled</th>
                            <th>Errori</th>
                            <th>Durata</th>
                        </tr>
                    </thead>
                    <tbody>
                        {getFiltered().map(s => (
                            <tr key={s.id}>
                                <td>{s.date}</td>
                                <td>
                                    <span className={`badge ${s.site.includes('merino') ? 'badge-blue' : 'badge-purple'}`}>
                                        {s.site.includes('merinouniversity') ? 'MU' : 'WoM'}
                                    </span>
                                    {' '}{s.site}
                                </td>
                                <td>{s.total_urls}</td>
                                <td style={{fontWeight:600}}>{s.indexed}</td>
                                <td>
                                    <span className={`badge ${s.indexed/s.total_urls > 0.5 ? 'badge-green' : s.indexed/s.total_urls > 0.1 ? 'badge-yellow' : 'badge-red'}`}>
                                        {pct(s.indexed, s.total_urls)}
                                    </span>
                                </td>
                                <td>{s.crawled_not_indexed || 0}</td>
                                <td>{s.not_crawled || 0}</td>
                                <td>{s.errors || 0}</td>
                                <td>{s.duration_minutes ? s.duration_minutes + ' min' : '—'}</td>
                            </tr>
                        ))}
                        {getFiltered().length === 0 && (
                            <tr><td colSpan={9} style={{textAlign:'center', color:'#71717a', padding:'24px'}}>Nessuna scansione disponibile</td></tr>
                        )}
                    </tbody>
                </table>
            </div>

            {/* Instructions */}
            <div className="card" style={{marginTop:'16px'}}>
                <h3 style={{fontSize:'14px', fontWeight:600, marginBottom:'12px', color:'#fafafa'}}>📋 Come eseguire una scansione</h3>
                <div style={{fontSize:'12px', color:'#a1a1aa', lineHeight:'1.8'}}>
                    <div>1. Apri il Terminale Mac</div>
                    <div style={{fontFamily:'SF Mono, monospace', background:'#111113', padding:'8px 12px', borderRadius:'6px', margin:'6px 0', color:'#60a5fa'}}>
                        cd /Users/roberto/Documents/Claude/Projects/albeni1905.com/scripts
                    </div>
                    <div>2. Lancia MU:</div>
                    <div style={{fontFamily:'SF Mono, monospace', background:'#111113', padding:'8px 12px', borderRadius:'6px', margin:'6px 0', color:'#60a5fa'}}>
                        python3 gsc_index_monitor.py --property "https://merinouniversity.com/" --sitemap https://merinouniversity.com/sitemap_index.xml
                    </div>
